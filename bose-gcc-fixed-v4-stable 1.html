<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bose GCC Proposal</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
html,body {
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
  background:#fff;
}

#root {
  width:100%;
  min-height:100vh;
}

/* ===== IMMERSIVE PATCH ===== */

.sec{
  scroll-margin-top:120px;
}

.fcard,
.tephase,
.pillar,
.ccard,
.mpanel,
.jdet{
  transition:
    transform .5s cubic-bezier(.16,1,.3,1),
    box-shadow .5s cubic-bezier(.16,1,.3,1),
    border-color .4s ease;
}

.fcard:hover,
.tephase:hover,
.pillar:hover,
.ccard:hover,
.mpanel:hover{
  transform:translateY(-8px) scale(1.01);
  box-shadow:
    0 30px 80px rgba(0,0,0,.14),
    0 0 80px rgba(26,79,150,.10);
}

@keyframes burstReveal{
  from{
    opacity:0;
    transform:translateY(30px) scale(.95);
  }
  to{
    opacity:1;
    transform:none;
  }
}

.wi-body-inner{
  position:relative;
  margin-top:18px;
  border-radius:24px;
  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.9),
      rgba(246,244,240,.94)
    );
  backdrop-filter:blur(20px);
  box-shadow:
    0 20px 60px rgba(13,16,26,.08),
    0 0 100px rgba(26,79,150,.08);
  border:1px solid rgba(255,255,255,.6);
  overflow:hidden;
}

.wi-body-inner::before{
  content:'';
  position:absolute;
  width:240px;
  height:240px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(26,79,150,.12),transparent 70%);
  top:-120px;
  right:-80px;
}

.wi-body-inner::after{
  content:'';
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(192,28,28,.08),transparent 70%);
  bottom:-100px;
  left:-80px;
}

.world-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.world-glow span{
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  opacity:.22;
  animation:floatGlow 18s ease-in-out infinite;
}

.world-glow .g1{
  width:420px;
  height:420px;
  background:#1a4f96;
  top:-120px;
  right:-80px;
}

.world-glow .g2{
  width:340px;
  height:340px;
  background:#c01c1c;
  bottom:-120px;
  left:-80px;
}

.world-glow .g3{
  width:260px;
  height:260px;
  background:#6ab0f0;
  top:40%;
  left:40%;
}

@keyframes floatGlow{
  0%,100%{
    transform:translate(0,0) scale(1);
  }
  50%{
    transform:translate(20px,-20px) scale(1.08);
  }
}

img:not(.logo-img){
  transition:transform 1.2s ease;
}

img:not(.logo-img):hover{
  transform:scale(1.04);
}

.hstat:hover .sv,
.pillar:hover .pnum,
.tephase:hover h4{
  color:#2a6fc8;
}

@media(max-width:900px){

  .wi-body-inner{
    padding:24px !important;
  }

}


/* ===== FIX WHITE TEXT ===== */

.wi-body-inner,
.wi-body-inner *{
  color:#111 !important;
}

.wi-body-inner .wi-stat{
  color:#1a4f96 !important;
}

.expand-panel.text,
.expand-panel.text *{
  color:white !important;
}

/* ===== FIX HERO 4 BLOCK NAVIGATION ===== */

.hstat{
  cursor:default !important;
}

.hstat *{
  pointer-events:none;
}

/* Disable any scroll anchor behavior */
.hstat a,
.hstat[href],
.hstat[data-target]{
  pointer-events:none !important;
}

/* ===== MAKE EVERYTHING MORE INTERACTIVE ===== */

.pillar{
  overflow:hidden;
}

.pillar::before{
  content:'';
  position:absolute;
  inset:-40%;
  background:
    conic-gradient(
      from 0deg,
      transparent,
      rgba(106,176,240,.18),
      transparent
    );
  animation:spinGlow 8s linear infinite;
  opacity:0;
  transition:.5s;
}

.pillar:hover::before{
  opacity:1;
}

@keyframes spinGlow{
  to{
    transform:rotate(360deg);
  }
}

.tephase:hover{
  background:
    linear-gradient(
      135deg,
      rgba(26,79,150,.08),
      rgba(255,255,255,.95)
    );
}

.mpanel{
  overflow:hidden;
}

.mpanel::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(
      circle at var(--x,50%) var(--y,50%),
      rgba(106,176,240,.14),
      transparent 35%
    );
  pointer-events:none;
  transition:.2s;
}

.wi-item{
  position:relative;
  overflow:hidden;
}

.wi-item::before{
  content:'';
  position:absolute;
  width:160px;
  height:160px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(26,79,150,.12),transparent 70%);
  top:-60px;
  right:-60px;
  opacity:0;
  transition:.4s;
}

.wi-item:hover::before{
  opacity:1;
}

.ccard:hover{
  transform:
    translateX(8px)
    scale(1.02);
}


/* ===== WHITESPACE KILLER PATCH ===== */

/* stop giant hidden containers from reserving space */
/* kill giant vertical spacing */
.sec{
  padding-top:80px !important;
  padding-bottom:80px !important;
}

.hero{
  min-height:auto !important;
  padding-bottom:40px !important;
}

.mpanel,
.jdet,
.tedet{
  min-height:auto !important;
}

/* stop any accidental bottom jumps */
html,body{
  scroll-behavior:auto !important;
  overflow-anchor:none !important;
}

/* remove layout push effect */
.wi-grid{
  align-items:start !important;
}

/* floating reveal instead of pushing page */
.wi-body-inner{
  margin:14px 0 0 0 !important;
  position:relative !important;
  animation:floatIn .5s cubic-bezier(.16,1,.3,1);
}

@keyframes floatIn{
  from{
    opacity:0;
    transform:translateY(18px) scale(.97);
  }
  to{
    opacity:1;
    transform:none;
  }
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══ LOGO ═══════════════════════════════════════════════════════ */
const Logo = ({ size = 44 }) => (
  <img src="banner_logo.png" width={size} height={size} alt="ConglomerateIT" className="logo-img" style={{objectFit:"contain",display:"block"}}/>
);

/* ═══ RING ════════════════════════════════════════════════════════ */
const Ring = ({ score, size = 84, stroke = 7, color = "#1a4f96", animate = true }) => {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const [d, setD] = useState(0);
  useEffect(() => { if (animate) setTimeout(() => setD((score / 100) * circ), 200); else setD((score / 100) * circ); }, [score, circ, animate]);
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e8e6e1" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${d} ${circ - d}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 1.2s cubic-bezier(0.16,1,0.3,1)" }}/>
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontFamily: "var(--F)", fontSize: size * 0.28, fontWeight: 400, color, letterSpacing: "-.03em", lineHeight: 1 }}>{score}</span>
        <span style={{ fontFamily: "var(--M)", fontSize: 9, color: "#9c9590", letterSpacing: ".1em" }}>/100</span>
      </div>
    </div>
  );
};

/* ═══ ICON ════════════════════════════════════════════════════════ */
const Icon = ({ name, size = 20, className = "" }) => {
  const getPath = () => {
    switch (name) {
      case "target":
        return (
          <>
            <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" fill="none" />
            <circle cx="12" cy="12" r="6" stroke="currentColor" strokeWidth="2" fill="none" />
            <circle cx="12" cy="12" r="2" fill="currentColor" />
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
          </>
        );
      case "build":
        return (
          <>
            <path d="M2 22h20M5 22V7l8-5v20M9 22V11M13 22v-8M17 22v-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
            <path d="M17 12V6l5-3v9z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </>
        );
      case "lock":
        return (
          <>
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" strokeWidth="2" fill="none" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </>
        );
      case "chart-bar":
        return (
          <>
            <path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
            <path d="M3 20h18" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
          </>
        );
      case "chart-line":
        return (
          <>
            <path d="M3 3v17a1 1 0 0 0 1 1h17" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
            <path d="M18 9l-5 5-4-4-5 5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
            <path d="M14 9h4v4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </>
        );
      case "users":
        return (
          <>
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
            <circle cx="9" cy="7" r="4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </>
        );
      case "shield":
        return (
          <>
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </>
        );
      default:
        return null;
    }
  };

  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" className={className} style={{ display: "inline-block", verticalAlign: "middle" }}>
      {getPath()}
    </svg>
  );
};

/* ═══ CSS ═════════════════════════════════════════════════════════ */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,200..900,0..100&family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#fff;--bg2:#f6f4f0;--bg3:#eeece8;--s1:#e4e1da;--s2:#d4d0c8;
  --l1:rgba(13,16,26,.07);--l2:rgba(13,16,26,.13);--l3:rgba(13,16,26,.22);
  --ink:#0d1017;--ink2:#252219;--ink3:#6a635a;--ink4:#9c9590;
  --navy:#0d1f3c;--blue:#1a4f96;--blue2:#2a6fc8;--blue3:#6ab0f0;
  --bs:rgba(26,79,150,.08);--bl:rgba(26,79,150,.22);
  --red:#c01c1c;--red2:#e83030;--rs:rgba(192,28,28,.07);--rl:rgba(192,28,28,.22);
  --gold:#9d7c2a;--gs:rgba(157,124,42,.1);
  --sage:#2a7a3a;
  --sh1:0 1px 3px rgba(13,16,26,.05),0 1px 2px rgba(13,16,26,.03);
  --sh2:0 4px 16px rgba(13,16,26,.07),0 2px 6px rgba(13,16,26,.04);
  --sh3:0 12px 40px rgba(13,16,26,.09),0 4px 12px rgba(13,16,26,.05);
  --sh4:0 24px 64px rgba(13,16,26,.11),0 8px 20px rgba(13,16,26,.07);
  --ease:cubic-bezier(.22,.61,.36,1);
  --eout:cubic-bezier(.16,1,.3,1);
  --eb:cubic-bezier(.34,1.56,.64,1);
  --F:'Fraunces','Georgia',serif;
  --B:'Inter Tight',system-ui,sans-serif;
  --M:'JetBrains Mono','Courier New',monospace;
  --px:clamp(16px,3.5vw,72px);--mw:1480px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{}
#app{font-family:var(--B);font-size:16px;line-height:1.55;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
#app ::-webkit-scrollbar{width:4px;height:4px;}
#app ::-webkit-scrollbar-track{background:var(--bg2);}
#app ::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px;}
::selection{background:var(--blue);color:#fff;}

/* SCROLL BAR */
.spb{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--red));z-index:500;transition:width 60ms linear;box-shadow:0 0 10px rgba(26,79,150,.5);}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:400;height:68px;padding:0 var(--px);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.88);backdrop-filter:blur(20px) saturate(130%);-webkit-backdrop-filter:blur(20px) saturate(130%);border-bottom:1px solid transparent;transition:border-color 200ms,box-shadow 200ms;}
.hdr.sc{border-color:var(--l1);box-shadow:0 2px 20px rgba(13,16,26,.06);}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;}
.btext strong{display:block;font-family:var(--F);font-size:17px;font-weight:400;letter-spacing:-.01em;line-height:1.1;color:var(--navy);}
.btext em{font-style:italic;color:var(--blue);}
.btext small{display:block;font-family:var(--M);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-top:2px;}
.hmeta{display:flex;align-items:center;gap:22px;font-family:var(--M);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.sdot{display:flex;align-items:center;gap:7px;}
.sdot::before{content:'';width:6px;height:6px;background:var(--sage);border-radius:50%;animation:pdot 2.4s ease infinite;}
@keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(42,122,58,.6)}50%{box-shadow:0 0 0 5px rgba(42,122,58,0)}}
.mnav{display:flex;gap:6px;}
.mnav a{padding:7px 14px;font-family:var(--M);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);border-radius:100px;cursor:pointer;transition:all 200ms;border:1px solid transparent;}
.mnav a:hover{color:var(--blue);background:var(--bs);border-color:var(--bl);}
.mnav a.act{color:var(--blue);background:var(--bs);}


/* LAYOUT */
.wrap{max-width:var(--mw);margin:0 auto;padding:0 var(--px);position:relative;z-index:10;}
.sec{padding:clamp(64px,10vw,140px) 0;border-bottom:1px solid var(--l1);position:relative;}
.sec:last-of-type{border-bottom:none;}
.sec.alt{background:var(--bg2);}

/* SECTION HEADER */
.shead{display:grid;grid-template-columns:220px 1fr;gap:clamp(28px,5vw,80px);margin-bottom:clamp(44px,6vw,80px);align-items:end;}
.snum{font-family:var(--M);font-size:10px;font-weight:500;letter-spacing:.2em;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.snum::before{content:'';width:18px;height:1.5px;background:var(--blue);}
.skick{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);}
.sh2{font-family:var(--F);font-size:clamp(30px,4.5vw,68px);font-weight:300;line-height:.98;letter-spacing:-.035em;color:var(--navy);margin-bottom:20px;}
.sh2 em{font-style:italic;font-variation-settings:"opsz" 144,"SOFT" 100;color:var(--blue);}
.slede{font-size:clamp(13.5px,1.2vw,16.5px);color:var(--ink2);max-width:58ch;line-height:1.62;}

/* REVEAL */
.rv{opacity:0;transform:translateY(22px);transition:opacity 900ms var(--eout),transform 900ms var(--eout);}
.rv.in{opacity:1;transform:translateY(0);}
.rvs>*{opacity:0;transform:translateY(16px);transition:opacity 750ms var(--eout),transform 750ms var(--eout);}
.rvs.in>*:nth-child(1){transition-delay:0ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(2){transition-delay:65ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(3){transition-delay:130ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(4){transition-delay:195ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(5){transition-delay:260ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(6){transition-delay:325ms;opacity:1;transform:translateY(0);}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;padding-top:clamp(88px,14vh,140px);padding-bottom:0;position:relative;overflow:hidden;}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(to right,rgba(13,16,26,.038) 1px,transparent 1px),linear-gradient(to bottom,rgba(13,16,26,.038) 1px,transparent 1px);background-size:clamp(36px,5vw,78px) clamp(36px,5vw,78px);pointer-events:none;}
.horb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;will-change:transform;}
.horb.a{width:640px;height:640px;top:-180px;right:-160px;background:radial-gradient(circle,rgba(26,79,150,.1),transparent 65%);animation:fo1 15s ease infinite;}
.horb.b{width:520px;height:520px;bottom:-100px;left:-120px;background:radial-gradient(circle,rgba(192,28,28,.07),transparent 65%);animation:fo2 19s ease infinite;}
.horb.c{width:380px;height:380px;top:40%;left:40%;background:radial-gradient(circle,rgba(157,124,42,.06),transparent 65%);animation:fo3 22s ease infinite;}
@keyframes fo1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,35px)}}
@keyframes fo2{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-25px)}}
@keyframes fo3{0%,100%{transform:translate(0,0)}33%{transform:translate(-20px,20px)}66%{transform:translate(20px,-15px)}}

.htag{display:flex;align-items:center;gap:11px;font-family:var(--M);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);font-weight:500;}
.htag .bar{width:26px;height:1.5px;background:linear-gradient(90deg,var(--blue),var(--red));flex-shrink:0;}

.heroh{font-family:var(--F);font-size:clamp(38px,7vw,118px);font-weight:220;font-variation-settings:"opsz" 144,"SOFT" 60;line-height:.93;letter-spacing:-.04em;color:var(--navy);max-width:17ch;margin-bottom:clamp(22px,4vw,44px);}
.heroh em{font-style:italic;font-variation-settings:"opsz" 144,"SOFT" 100;color:var(--blue);}
.rw{display:inline-block;overflow:hidden;vertical-align:top;}
.rw span{display:inline-block;transform:translateY(112%);transition:transform 950ms var(--eout);}
.hv .rw span{transform:translateY(0);}
.rw:nth-child(1) span{transition-delay:0ms}.rw:nth-child(2) span{transition-delay:65ms}.rw:nth-child(3) span{transition-delay:130ms}.rw:nth-child(4) span{transition-delay:195ms}.rw:nth-child(5) span{transition-delay:260ms}.rw:nth-child(6) span{transition-delay:325ms}

.hsub{font-size:clamp(15px,1.4vw,20px);line-height:1.55;color:var(--ink2);max-width:620px;margin-bottom:clamp(36px,5vw,56px);opacity:0;transform:translateY(14px);transition:all 900ms var(--eout) 1.1s;}
.hv .hsub{opacity:1;transform:translateY(0);}

/* HERO STATS */
.hstats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-radius:18px;overflow:hidden;border:1px solid var(--l1);box-shadow:var(--sh2);opacity:0;transform:translateY(14px);transition:all 900ms var(--eout) 1.4s;}
.hv .hstats{opacity:1;transform:translateY(0);}
.hstat{background:var(--bg);padding:24px 20px 28px;cursor:pointer;position:relative;overflow:hidden;border-right:1px solid var(--l1);transition:background 220ms;}
.hstat:last-child{border-right:none;}
.hstat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue2));transform:scaleX(0);transform-origin:left;transition:transform 380ms var(--eout);}
.hstat:hover{background:var(--bg2);}
.hstat:hover::after,.hstat.sel::after{transform:scaleX(1);}
.hstat.sel{background:var(--bs);}

.hstat .sl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);line-height:1.5;}
.harr{position:absolute;top:18px;right:18px;width:26px;height:26px;border-radius:50%;border:1px solid var(--l2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink4);transition:all 200ms;}

/* HERO TWO-COLUMN LAYOUT */

.hero-text .hsub{margin-bottom:0;max-width:none;}

.marq{border-top:1px solid var(--l1);background:var(--bg2);padding:10px 0;overflow:hidden;margin-top:clamp(28px,5vw,52px);}

/* WHY INDIA - ACCORDION */
.wi-grid{display:flex;flex-direction:column;gap:1px;background:var(--l1);border-radius:18px;overflow:hidden;border:1px solid var(--l1);}

.wi-title{font-family:var(--F);font-size:clamp(17px,1.7vw,22px);font-weight:350;letter-spacing:-.02em;color:var(--navy);}

.wi-item.open .wi-toggle{background:var(--blue);color:#fff;border-color:var(--blue);transform:rotate(180deg);}
.wi-stat{display:inline-flex;align-items:center;gap:10px;margin-top:12px;padding:6px 14px;background:var(--bs);border:1px solid var(--bl);border-radius:100px;font-family:var(--M);font-size:10px;font-weight:500;color:var(--blue);letter-spacing:.08em;}

/* BLUEPRINT FLIP CARDS */
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.fcard{height:260px;perspective:1200px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

.ff,.fb{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;border:1.5px solid var(--l1);padding:26px;}
.ff{background:var(--bg);display:flex;flex-direction:column;justify-content:space-between;transition:border-color 200ms,box-shadow 200ms;}

.fb{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);transform:rotateY(180deg);display:flex;flex-direction:column;justify-content:space-between;}

.fn::before{content:'';width:12px;height:1.5px;background:var(--blue);}

.ftip{font-family:var(--M);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);display:flex;align-items:center;gap:6px;}

.fbn{font-family:var(--F);font-size:clamp(30px,3vw,40px);font-weight:250;color:rgba(255,255,255,.2);line-height:1;letter-spacing:-.04em;margin-bottom:6px;}
.fb h4{font-family:var(--F);font-size:clamp(16px,1.5vw,20px);font-weight:350;color:#fff;margin-bottom:10px;letter-spacing:-.015em;}
.fb p{font-size:12.5px;line-height:1.62;color:rgba(255,255,255,.78);}
.fbk{font-family:var(--M);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px;}

/* MODEL PANELS */
.mpanels{display:flex;flex-direction:column;gap:18px;}
.mpanel{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(28px,4vw,52px);display:grid;grid-template-columns:260px 1fr;gap:clamp(28px,4vw,52px);align-items:start;position:relative;overflow:hidden;}

.msum{color:var(--ink2);font-size:14px;line-height:1.65;}

/* BOT TABS */
.btabs{display:flex;gap:0;background:var(--l1);border-radius:11px;overflow:hidden;margin-bottom:18px;padding:1px;}

.bdk{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}

/* COST */
.cctrl{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:18px;margin-bottom:22px;padding:16px 20px;background:var(--bg);border:1.5px solid var(--l1);border-radius:12px;}

.sw input[type=range]{width:100%;-webkit-appearance:none;height:3px;background:var(--s1);outline:none;border-radius:2px;position:relative;z-index:2;cursor:pointer;}

.sw input[type=range]::-moz-range-thumb{width:20px;height:20px;background:var(--blue);border-radius:50%;border:3px solid #fff;cursor:grab;}
.ccval{font-family:var(--F);font-size:clamp(19px,1.8vw,26px);font-weight:400;color:var(--blue);letter-spacing:-.025em;min-width:68px;text-align:right;}
.cviz{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.cstk{background:var(--bg);border:1.5px solid var(--l1);border-radius:12px;padding:20px;}

.cstt::before{content:'';width:12px;height:1.5px;background:var(--ink3);}

.cr.mg{color:var(--blue);border-top:1.5px solid var(--bl);margin-top:4px;padding-top:13px;}
.cn{font-size:11.5px;color:var(--ink2);}
.cr.mg .cn{color:var(--blue);font-weight:500;}
.cb{height:5px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.cbf{height:100%;background:linear-gradient(90deg,var(--s1),var(--s2));transition:width 400ms var(--eout);border-radius:2px;}
.cr.mg .cbf{background:linear-gradient(90deg,var(--blue),var(--blue2));}
.ca{font-family:var(--M);font-size:11px;text-align:right;color:var(--ink);font-variant-numeric:tabular-nums;}
.ctot{display:flex;justify-content:space-between;align-items:baseline;padding-top:15px;margin-top:8px;border-top:1.5px solid var(--l2);}
.ctlbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);}
.ctval{font-family:var(--F);font-size:clamp(19px,1.8vw,26px);font-weight:400;color:var(--blue);letter-spacing:-.025em;font-variant-numeric:tabular-nums;}
.ccomp{display:flex;flex-direction:column;gap:10px;}
.ccard{padding:16px 18px;background:var(--bg);border:1.5px solid var(--l1);border-radius:11px;cursor:pointer;position:relative;transition:all 200ms;}
.ccard:hover{transform:translateX(4px);border-color:var(--bl);}
.ccard.win{border-color:var(--blue);background:var(--bs);}
.ccard.win::after{content:'Best fit';position:absolute;top:14px;right:14px;font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);background:rgba(26,79,150,.12);padding:3px 8px;border-radius:3px;}
.ccn{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.ccard.win .ccn{color:var(--blue);}
.ccm{font-family:var(--F);font-size:clamp(17px,1.6vw,22px);font-weight:400;margin-bottom:4px;letter-spacing:-.02em;}
.ccd{font-size:11.5px;color:var(--ink3);line-height:1.45;}

/* DRAG COMPARISON */
.cmpwrap{background:var(--bg);border:1.5px solid var(--l1);border-radius:14px;padding:22px;margin-top:16px;}
.cmph{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px;display:flex;align-items:center;gap:7px;}

.cmpA .cl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--red);white-space:nowrap;}

.cmpleg{display:flex;justify-content:space-between;margin-top:10px;font-family:var(--M);font-size:9px;font-weight:500;color:var(--ink3);letter-spacing:.08em;}

/* CITY MINI */
.cmini{display:grid;grid-template-columns:1fr 1px 1fr;gap:clamp(18px,3.5vw,44px);}
.cmdiv{background:linear-gradient(180deg,transparent,var(--l2),transparent);align-self:stretch;}
.cmr{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:5px;}
.cmt{font-family:var(--F);font-size:clamp(22px,2.3vw,32px);font-weight:350;margin-bottom:18px;letter-spacing:-.025em;color:var(--navy);}

.cmts{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--l2);border-radius:100px;color:var(--ink2);background:var(--bg);transition:all 200ms;cursor:default;}
.pill:hover{border-color:var(--bl);color:var(--blue);}

/* GCCAAS ADVANTAGE */
.pillars{display:grid;grid-template-columns:repeat(5,1fr);gap:0;background:var(--l1);border:1px solid var(--l1);border-radius:20px;overflow:hidden;}

.pillar:hover,.pillar.act{background:var(--bs);}

.pillar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:0;background:var(--blue);transition:height 300ms var(--eout);}
.pillar:hover::after{height:3px;}
.pillar.act::after{display:none;}
.pnum{font-family:var(--F);font-size:clamp(36px,3vw,48px);font-weight:220;color:var(--blue);line-height:1;letter-spacing:-.04em;margin-bottom:14px;}
.pillar.act .pnum{color:rgba(255,255,255,.25);}
.ptitle{font-family:var(--F);font-size:clamp(16px,1.4vw,20px);font-weight:350;color:var(--navy);letter-spacing:-.015em;margin-bottom:10px;}
.pillar.act .ptitle{color:#fff;}
.pshort{font-size:12.5px;color:var(--ink3);line-height:1.5;}

/* CITIES MAP */
.cstage{display:grid;grid-template-columns:1.4fr 1fr;gap:clamp(18px,2.5vw,36px);align-items:stretch;}

.mmet{position:absolute;top:18px;left:18px;font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);display:flex;align-items:center;gap:7px;z-index:2;}
.mmet::before{content:'';width:14px;height:1.5px;background:var(--blue);}

.mli{display:flex;align-items:center;gap:8px;}
.mld{width:7px;height:7px;border-radius:50%;background:var(--blue);}

.cpanel{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(22px,2.5vw,34px);display:flex;flex-direction:column;}
.ctabs{display:flex;margin-bottom:26px;border-bottom:1.5px solid var(--l1);}
.ctab{padding:10px 0;margin-right:26px;font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);border-bottom:1.5px solid transparent;cursor:pointer;transition:all 200ms;position:relative;top:1.5px;}

.ctab:hover:not(.act){color:var(--ink);}
.ccc h3{font-family:var(--F);font-size:clamp(26px,3vw,42px);margin-bottom:5px;font-weight:300;letter-spacing:-.03em;color:var(--navy);}
.crole{font-family:var(--F);font-style:italic;font-variation-settings:"opsz" 60,"SOFT" 100;font-size:clamp(13px,1.2vw,16px);color:var(--blue);margin-bottom:22px;font-weight:350;}
.cdesc{color:var(--ink2);font-size:13.5px;line-height:1.65;margin-bottom:22px;}
.calloc{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;padding:16px;background:var(--bg);border-radius:10px;border:1px solid var(--l1);}
.ai .al{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}

.ceco h4::before{content:'';width:12px;height:1.5px;background:var(--blue);}
.ceco p{font-size:13px;color:var(--ink2);line-height:1.62;}
.cscorewrap{margin-top:22px;padding-top:18px;border-top:1px solid var(--l1);display:flex;align-items:center;gap:18px;}
.cscl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);line-height:1.55;}

/* TALENT ENGINE */
.tephases{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
.tephase{background:var(--bg2);border:1.5px solid var(--l1);border-radius:16px;padding:26px 22px;cursor:pointer;transition:all 280ms;position:relative;overflow:hidden;}
.tephase::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--blue),var(--blue2));transform:scaleX(0);transition:transform 350ms var(--eout);}
.tephase:hover::before,.tephase.act::before{transform:scaleX(1);}
.tephase.act{background:var(--bs);border-color:var(--bl);}
.tephase .picon{width:44px;height:44px;border-radius:11px;background:var(--bs);display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:22px;transition:background 200ms;color:var(--blue);}
.tephase.act .picon{background:var(--blue);color:#fff;}
.tephase h4{font-family:var(--F);font-size:clamp(20px,1.9vw,26px);font-weight:350;color:var(--navy);letter-spacing:-.02em;margin-bottom:8px;}
.tephase p{font-size:13px;color:var(--ink3);line-height:1.5;}
.tedet{background:var(--bg);border:1.5px solid var(--l1);border-radius:16px;padding:clamp(24px,3vw,40px);display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,3vw,40px);min-height:260px;position:relative;overflow:hidden;transition:opacity 250ms;}
.tedet::before{content:'';position:absolute;top:0;right:0;width:220px;height:220px;background:radial-gradient(circle,var(--bs),transparent 60%);pointer-events:none;}
.tedet h3{font-family:var(--F);font-size:clamp(22px,2.2vw,30px);font-weight:300;margin-bottom:8px;letter-spacing:-.025em;color:var(--navy);}
.tedet .tmeta{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.tedet .tmeta::before{content:'';width:14px;height:1.5px;background:var(--blue);}
.tedet p{font-size:14px;color:var(--ink2);line-height:1.65;}
.telist{display:flex;flex-direction:column;gap:10px;}
.teli{display:flex;align-items:flex-start;gap:11px;font-size:13px;color:var(--ink2);line-height:1.5;}
.tec{flex-shrink:0;width:16px;height:16px;border:1.5px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--blue);background:var(--bs);margin-top:1px;}

/* JOURNEY */
.jscr{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(26px,3.5vw,42px);margin-bottom:18px;}
.jsct{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;}
.jsct h3{font-family:var(--F);font-size:clamp(17px,1.7vw,22px);font-weight:350;letter-spacing:-.02em;color:var(--navy);}
.jcnt{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--blue);background:var(--bs);padding:5px 12px;border-radius:100px;}
.jtr{position:relative;padding-bottom:40px;cursor:pointer;}
.jtrack{height:4px;background:var(--s1);border-radius:2px;position:relative;}
.jfill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--blue),var(--blue2));border-radius:2px;transition:width 480ms var(--eout);}
.jtk{position:absolute;top:50%;transform:translate(-50%,-50%);width:15px;height:15px;border-radius:50%;background:var(--bg);border:2px solid var(--s2);cursor:pointer;transition:all 220ms;z-index:2;-webkit-tap-highlight-color:transparent;}
.jtk.act{border-color:var(--blue);background:var(--blue);box-shadow:0 0 0 4px rgba(26,79,150,.15),0 0 12px var(--blue);}
.jtk:hover{border-color:var(--blue);}
.jlabs{display:flex;justify-content:space-between;position:absolute;bottom:0;left:0;right:0;}
.jlab{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);cursor:pointer;transition:color 200ms;text-align:center;flex:1;}
.jlab.act{color:var(--blue);}
.jdet{background:var(--bg);border:1.5px solid var(--l1);border-radius:16px;padding:clamp(22px,3vw,38px);display:grid;grid-template-columns:1fr 2fr;gap:clamp(22px,3vw,38px);min-height:260px;position:relative;overflow:hidden;transition:opacity 220ms;}
.jdet::before{content:'';position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle,var(--bs),transparent 60%);pointer-events:none;}
.jdl h3{font-family:var(--F);font-size:clamp(24px,2.6vw,36px);margin-bottom:8px;font-weight:300;letter-spacing:-.025em;color:var(--navy);}
.jdl .jmeta{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.jdl .jmeta::before{content:'';width:14px;height:1.5px;background:var(--blue);}
.jdl p{font-size:13.5px;color:var(--ink2);line-height:1.65;}
.jdr h4{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.jdr h4::before{content:'';width:12px;height:1.5px;background:var(--ink3);}
.jms{display:grid;grid-template-columns:1fr 1fr;gap:11px 18px;}
.jmi{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:var(--ink2);line-height:1.5;}
.jchk{flex-shrink:0;width:15px;height:15px;border:1.5px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7.5px;color:var(--blue);background:var(--bs);margin-top:1px;}
.tcmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:0;}
.tcb{background:var(--bg2);border:1.5px solid var(--l1);border-radius:12px;padding:20px 24px;}
.tcb.ours{border-color:var(--blue);background:var(--bs);}
.tclbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.tcb.ours .tclbl{color:var(--blue);}
.tcv{font-family:var(--F);font-size:clamp(20px,1.9vw,28px);margin-bottom:12px;font-weight:350;letter-spacing:-.025em;color:var(--navy);}
.tcbv{height:5px;background:var(--s1);border-radius:2px;overflow:hidden;}
.tcbf{height:100%;background:var(--s2);border-radius:2px;}
.tcb.ours .tcbf{background:linear-gradient(90deg,var(--blue),var(--blue2));}
.tcm{font-family:var(--M);font-size:9px;color:var(--ink3);margin-top:10px;letter-spacing:.05em;}

/* ENGINE */
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.gpyr{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(26px,3.5vw,40px);position:relative;overflow:hidden;}
.gpyr::before{content:'';position:absolute;top:-40%;right:-25%;width:65%;height:65%;background:radial-gradient(circle,rgba(120,150,180,.08),transparent 60%);pointer-events:none;}
.gpyr h3,.smap h3{font-family:var(--F);font-size:clamp(20px,2vw,26px);margin-bottom:6px;font-weight:350;letter-spacing:-.02em;color:var(--navy);}
.gsub{color:var(--ink3);font-size:13px;margin-bottom:26px;font-family:var(--F);font-style:italic;font-variation-settings:"opsz" 60,"SOFT" 100;}
.tier{display:grid;grid-template-columns:76px 1fr;gap:16px;padding:14px 18px;margin-bottom:10px;background:var(--bg);border:1.5px solid var(--l1);border-radius:10px;position:relative;transition:all 200ms;cursor:pointer;overflow:hidden;}
.tier::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:width 200ms;border-radius:0 1px 1px 0;}
.tier.t1::before{background:var(--blue);}
.tier.t2::before{background:var(--ink2);}
.tier.t3::before{background:var(--red);}
.tier:hover{border-color:var(--bl);transform:translateX(5px);background:var(--bs);}
.tier:hover::before{width:5px;}
.tier .tc{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;align-self:center;text-align:right;}
.tier.t1 .tc{color:var(--blue);}
.tier.t2 .tc{color:var(--ink2);}
.tier.t3 .tc{color:var(--red);}
.tier h4{font-family:var(--F);font-size:15px;margin-bottom:3px;font-weight:400;letter-spacing:-.015em;color:var(--navy);}
.tier p{font-size:12.5px;color:var(--ink2);line-height:1.45;}
.smap{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(26px,3.5vw,40px);position:relative;overflow:hidden;}
.smap::before{content:'';position:absolute;top:-25%;left:-20%;width:55%;height:55%;background:radial-gradient(circle,rgba(192,28,28,.06),transparent 60%);pointer-events:none;}
.scols{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.scol h4{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;margin-bottom:11px;padding-bottom:9px;border-bottom:1.5px solid var(--l1);display:flex;align-items:center;gap:6px;}
.scol.cl h4{color:var(--blue);border-color:var(--blue);}
.scol.us h4{color:var(--red);border-color:var(--red);}
.scol h4::before{content:'●';font-size:8px;}
.stk{padding:8px 11px;margin-bottom:5px;background:var(--bg);border:1px solid var(--l1);border-radius:6px;font-size:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 200ms;}
.stk:hover{background:var(--bs);border-color:var(--bl);transform:translateX(2px);}
.sr{font-family:var(--M);font-size:8.5px;font-weight:500;color:var(--ink3);padding:2px 5px;background:var(--bg2);border-radius:3px;}
.scol.cl .sr{color:var(--blue);}
.scol.us .sr{color:var(--red);}
.sbb{margin-top:14px;padding:12px 15px;background:linear-gradient(90deg,var(--bs),var(--rs));border:1px solid var(--l1);border-radius:9px;display:flex;align-items:center;gap:12px;}
.sbbl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);padding:3px 7px;border:1px solid var(--l2);border-radius:3px;flex-shrink:0;}
.sbbt{font-size:11.5px;color:var(--ink2);line-height:1.45;}

/* CONTROL TOWER */
.ctgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.ctq{background:var(--bg2);border:1.5px solid var(--l1);border-radius:16px;padding:24px;cursor:pointer;transition:all 250ms;position:relative;overflow:hidden;}
.ctq::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;transition:background 250ms;}
.ctq.d::before{background:var(--blue);}
.ctq.f::before{background:var(--sage);}
.ctq.p::before{background:var(--gold);}
.ctq.r::before{background:var(--red);}
.ctq:hover,.ctq.act{background:var(--bg);border-color:var(--bl);box-shadow:var(--sh2);}
.ctqh{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.ctqi{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg3);}
.ctq.d .ctqi{background:rgba(26,79,150,.1);color:var(--blue);}
.ctq.f .ctqi{background:rgba(42,122,58,.1);color:var(--sage);}
.ctq.p .ctqi{background:rgba(157,124,42,.1);color:var(--gold);}
.ctq.r .ctqi{background:rgba(192,28,28,.1);color:var(--red);}
.ctqtitle{font-family:var(--F);font-size:clamp(17px,1.6vw,21px);font-weight:350;color:var(--navy);letter-spacing:-.015em;}
.ctqbody{font-size:13px;color:var(--ink2);line-height:1.6;}
.ctqdet{max-height:0;overflow:hidden;transition:max-height 400ms var(--eout);}
.ctq.act .ctqdet{max-height:300px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--l1);}
.ctqkpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.ctqkpi{background:var(--bg2);border-radius:8px;padding:10px 12px;}
.ctqkn{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.ctqkv{font-family:var(--F);font-size:clamp(17px,1.6vw,22px);font-weight:400;color:var(--navy);letter-spacing:-.02em;}
.ctqkv em{color:var(--blue);font-style:normal;}
.cttakeaway{background:var(--navy);border-radius:14px;padding:22px 28px;display:flex;align-items:center;gap:18px;}
.cttakeaway strong{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--blue2);flex-shrink:0;background:rgba(26,79,150,.2);padding:6px 12px;border-radius:6px;}
.cttakeaway p{color:rgba(255,255,255,.78);font-size:14.5px;font-family:var(--F);font-variation-settings:"opsz" 60,"SOFT" 80;font-weight:350;letter-spacing:-.01em;}

/* TRANSFER RADAR */
.tstage{display:grid;grid-template-columns:1.1fr 1fr;gap:clamp(26px,4.5vw,52px);align-items:start;}
.triwrap{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(28px,4vw,46px);text-align:center;}
.triwrap svg{width:100%;max-width:380px;height:auto;margin:0 auto;display:block;overflow:visible;}
.trilbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:7px;}
.trit{font-family:var(--F);font-size:clamp(20px,2vw,26px);margin-bottom:20px;font-weight:350;letter-spacing:-.02em;color:var(--navy);}
.trit em{font-style:italic;color:var(--blue);}
.rscores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px;}
.rsrow{display:grid;grid-template-columns:64px 1fr 28px;align-items:center;gap:7px;}
.rsl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);}
.rsrow input[type=range]{-webkit-appearance:none;height:3px;background:var(--s1);outline:none;border-radius:2px;cursor:pointer;}
.rsrow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--blue);border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--blue);}
.rsv{font-family:var(--M);font-size:9.5px;font-weight:500;color:var(--blue);text-align:right;}
.tpills h3{font-family:var(--F);font-size:clamp(24px,2.8vw,38px);margin-bottom:16px;font-weight:300;letter-spacing:-.025em;color:var(--navy);}
.tpills h3 em{font-style:italic;color:var(--blue);}
.tpills>p{color:var(--ink2);margin-bottom:26px;font-size:14px;line-height:1.65;max-width:52ch;}
.pil{display:grid;grid-template-columns:46px 1fr;gap:16px;padding:17px 0;border-top:1px solid var(--l1);cursor:pointer;transition:all 200ms;position:relative;}
.pil:last-child{border-bottom:1px solid var(--l1);}
.pil::after{content:'→';position:absolute;right:4px;top:50%;transform:translateY(-50%);color:var(--ink4);font-size:12px;opacity:0;transition:all 200ms;}
.pil:hover::after{opacity:1;right:0;color:var(--blue);}
.pil:hover{padding-left:6px;}
.pnum{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;color:var(--blue);}
.pil h4{font-family:var(--F);font-size:clamp(15px,1.4vw,18px);font-weight:400;margin-bottom:4px;letter-spacing:-.015em;color:var(--navy);}
.pil p{font-size:13px;color:var(--ink2);line-height:1.55;}

/* PROOF */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:56px;}
.case{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(24px,3vw,38px);cursor:pointer;transition:all 300ms;position:relative;overflow:hidden;}
.case::before{content:'';position:absolute;top:0;right:0;width:160px;height:160px;background:radial-gradient(circle,var(--bs),transparent 60%);opacity:.4;transition:opacity 300ms;}
.case:hover{border-color:var(--blue);box-shadow:var(--sh3);}
.case:hover::before{opacity:1;}
.ctag{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;display:flex;align-items:center;gap:9px;}
.ctag::before{content:'';width:14px;height:1.5px;background:var(--blue);}
.case h3{font-family:var(--F);font-size:clamp(19px,1.9vw,25px);margin-bottom:8px;font-weight:350;letter-spacing:-.025em;color:var(--navy);}
.case h3 em{font-style:italic;color:var(--ink3);}
.cmeta{font-family:var(--M);font-size:9.5px;color:var(--ink3);margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--l1);}
.cout{font-size:13.5px;color:var(--ink2);line-height:1.65;margin-bottom:20px;}
.cstat{display:flex;gap:28px;}
.csv{font-family:var(--F);font-size:clamp(22px,2.2vw,32px);color:var(--blue);display:block;line-height:1;font-weight:350;letter-spacing:-.02em;}
.csl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-top:6px;display:block;}
.cexp{max-height:0;overflow:hidden;transition:max-height 450ms var(--eout),margin-top 450ms var(--eout),padding-top 450ms var(--eout);}
.case:hover .cexp{max-height:500px;margin-top:16px;padding-top:16px;border-top:1px dashed var(--l1);}
.cexplist{display:flex;flex-direction:column;gap:9px;}
.cexpit{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:var(--ink2);line-height:1.5;}
.cexpit::before{content:'→';color:var(--blue);flex-shrink:0;font-size:11px;margin-top:2px;}
.why{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(32px,4vw,52px);}
.why h3{font-family:var(--F);font-size:clamp(24px,2.8vw,38px);margin-bottom:8px;font-weight:300;letter-spacing:-.025em;color:var(--navy);}
.why h3 em{font-style:italic;color:var(--blue);}
.wsub{color:var(--ink3);margin-bottom:32px;font-family:var(--F);font-style:italic;font-variation-settings:"opsz" 60,"SOFT" 100;font-size:15px;}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.wcard{padding:18px;background:var(--bg);border:1.5px solid var(--l1);border-radius:12px;transition:all 250ms;cursor:pointer;position:relative;overflow:hidden;}
.wcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--red));transform:scaleX(0);transition:transform 350ms var(--eout);}
.wcard:hover{transform:translateY(-3px);border-color:var(--bl);box-shadow:var(--sh2);}
.wcard:hover::before{transform:scaleX(1);}
.wcard h4{font-family:var(--F);font-size:clamp(15px,1.5vw,18px);margin-bottom:8px;font-weight:400;letter-spacing:-.015em;color:var(--navy);}
.wcard p{font-size:12.5px;color:var(--ink2);line-height:1.6;}

/* CTA */
.cta{padding:clamp(60px,10vw,120px) 0;text-align:center;background:var(--navy);position:relative;overflow:hidden;}
.cta::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;height:80vw;max-width:1000px;max-height:1000px;background:radial-gradient(circle,rgba(26,79,150,.5),transparent 60%);pointer-events:none;}
.cta h2{font-family:var(--F);font-size:clamp(32px,5.5vw,80px);font-weight:220;font-variation-settings:"opsz" 144,"SOFT" 60;letter-spacing:-.04em;margin-bottom:24px;line-height:.94;color:#fff;position:relative;z-index:2;}
.cta h2 em{font-style:italic;font-variation-settings:"opsz" 144,"SOFT" 100;color:var(--blue2);}
.ctam{font-family:var(--M);font-size:10px;font-weight:500;letter-spacing:.17em;text-transform:uppercase;color:rgba(255,255,255,.45);display:flex;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap;position:relative;z-index:2;}
.ctam span{display:flex;align-items:center;gap:8px;}
.ctam span::before{content:'◆';color:var(--blue2);font-size:7px;}
.ctam span:first-child::before{display:none;}

/* FOOTER */
.foot{padding:48px var(--px) 32px;border-top:1px solid var(--l1);background:var(--bg2);}
.fin{max-width:var(--mw);margin:0 auto 36px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;}
.fbt strong{display:block;font-family:var(--F);font-size:clamp(20px,2.2vw,30px);font-weight:300;line-height:1.05;margin-bottom:12px;letter-spacing:-.025em;color:var(--navy);}
.fbt strong em{color:var(--blue);font-style:italic;}
.fsub{color:var(--ink3);font-size:13px;max-width:340px;line-height:1.6;}
.foot h5{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:13px;}
.foot ul{list-style:none;}
.foot ul li{font-size:13px;color:var(--ink2);margin-bottom:8px;line-height:1.5;}

.vstab.act{border-color:var(--blue);background:var(--bs);box-shadow:0 12px 32px rgba(26,79,150,.12);}
.vstab.act.us{border-color:var(--blue);background:linear-gradient(135deg,var(--bs),rgba(26,79,150,.14));}
.vstn{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.vstab.act .vstn{color:var(--blue);}
.vstt{font-family:var(--F);font-size:clamp(15px,1.4vw,18px);font-weight:400;color:var(--navy);letter-spacing:-.015em;line-height:1.2;}
.vstab.us .vstt::after{content:' ●';color:var(--blue);font-size:10px;}
.vstable{display:grid;grid-template-columns:1.4fr repeat(2,1fr);gap:0;border:1px solid var(--l1);border-radius:14px;overflow:hidden;}
.vsrow{display:contents;}
.vshead .vsc,.vshead .vsd{background:var(--navy);color:#fff;font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:14px 18px;}
.vsc{padding:16px 18px;background:var(--bg);font-family:var(--M);font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);border-bottom:1px solid var(--l1);border-right:1px solid var(--l1);display:flex;align-items:center;}
.vsd{padding:16px 18px;background:var(--bg);font-size:13px;line-height:1.55;color:var(--ink2);border-bottom:1px solid var(--l1);border-right:1px solid var(--l1);display:flex;align-items:center;}
.vsd:last-child{border-right:none;}
.vsd.win{background:linear-gradient(135deg,var(--bs),rgba(26,79,150,.04));color:var(--navy);font-weight:500;position:relative;}
.vsd.win::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue);}
.vsd .verdict{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-top:4px;display:block;}

@media(max-width:900px){
  .tqgrid{grid-template-columns:1fr;}
  .vstabs{grid-template-columns:1fr 1fr;}
  .vstable{grid-template-columns:1fr;}
  .vsc,.vsd{border-right:none;}
}

/* ═══ SIDE NAV ═══ */
.snav{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:300;display:flex;flex-direction:column;gap:4px;}
.snav a{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:5px 0;font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink4);cursor:pointer;transition:color 200ms;}
.snav a::after{content:'';width:18px;height:1.5px;background:currentColor;transition:width 200ms,background 200ms;border-radius:1px;}
.snav a:hover{color:var(--ink2);}
.snav a:hover::after{width:30px;}
.snav a.act{color:var(--blue);}
.snav a.act::after{width:42px;}
.snav a .sl{opacity:0;transition:opacity 200ms;font-size:9px;}
.snav:hover .sl{opacity:1;}
