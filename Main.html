.mth{font-family:var(--F);font-size:clamp(20px,2.1vw,28px);font-weight:300;color:#fff;letter-spacing:-.025em;line-height:1.2;margin-bottom:8px;position:relative;z-index:1;}
.mth em{font-style:italic;color:#6ab0f0;}
.mtsub{font-size:13px;color:rgba(255,255,255,.7);line-height:1.55;max-width:60ch;margin-bottom:26px;position:relative;z-index:1;}

.mtruler{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:14px;position:relative;z-index:1;}

.mtweek:hover{background:rgba(106,176,240,.12);border-color:rgba(106,176,240,.4);transform:translateY(-3px);}
.mtweek.act{background:linear-gradient(135deg,rgba(106,176,240,.22),rgba(106,176,240,.08));border-color:#6ab0f0;transform:translateY(-4px);box-shadow:0 14px 30px rgba(106,176,240,.18);}
.mtweek.has::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;background:#6ab0f0;border-radius:50%;box-shadow:0 0 8px #6ab0f0;}
.mtwn{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:4px;}

.mtwv{font-family:var(--F);font-size:clamp(20px,2vw,26px);font-weight:300;color:#fff;letter-spacing:-.03em;line-height:1;}
.mtwc{font-family:var(--M);font-size:8px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-top:4px;}

.mtboard{background:rgba(0,0,0,.18);border:1px solid rgba(106,176,240,.15);border-radius:14px;padding:clamp(20px,2.4vw,28px);position:relative;z-index:1;min-height:200px;}
.mtbhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.mtbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;}
.mtbh{font-family:var(--F);font-size:clamp(16px,1.7vw,21px);font-weight:350;color:#fff;letter-spacing:-.02em;}
.mtbh em{font-style:italic;color:#6ab0f0;}
.mtbcount{font-family:var(--F);font-size:clamp(24px,2.6vw,32px);font-weight:300;color:#6ab0f0;letter-spacing:-.03em;line-height:1;}
.mtbcount em{font-style:normal;font-size:.45em;color:rgba(255,255,255,.5);letter-spacing:.05em;margin-left:4px;}
.mtgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.mtdrop{background:rgba(255,255,255,.04);border:1px solid rgba(106,176,240,.15);border-radius:10px;padding:14px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;transition:all 280ms;}
.mtdrop:hover{background:rgba(106,176,240,.08);border-color:rgba(106,176,240,.35);transform:translateX(3px);}

.mtdtxt{min-width:0;}
.mtdn{font-family:var(--F);font-size:13.5px;font-weight:400;color:#fff;letter-spacing:-.015em;line-height:1.3;margin-bottom:3px;}
.mtdm{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;color:rgba(106,176,240,.7);}
.mtdfmt{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;background:rgba(255,255,255,.06);border-radius:100px;color:rgba(255,255,255,.6);white-space:nowrap;flex-shrink:0;}
.mtemptyState{text-align:center;padding:30px 20px;color:rgba(255,255,255,.55);}

.mtemptyState .met{font-family:var(--F);font-size:14px;font-weight:350;color:rgba(255,255,255,.7);}
.mtemptyState .med{font-size:11.5px;color:rgba(255,255,255,.5);margin-top:5px;}

.mtsum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;position:relative;z-index:1;}
.mtsumc{background:rgba(255,255,255,.04);border:1px solid rgba(106,176,240,.18);border-radius:10px;padding:14px 16px;}
.mtsumv{font-family:var(--F);font-size:clamp(22px,2.4vw,30px);font-weight:300;color:#6ab0f0;letter-spacing:-.025em;line-height:1;margin-bottom:5px;}

@media(max-width:900px){

/* ═══ DEEP DIVE CAPSULES ═══ */

.dcap.op{border-color:var(--blue);box-shadow:0 22px 60px rgba(26,79,150,.1);}
.dcap.op .dchead{background:linear-gradient(135deg,var(--navy) 0%,#1a3461 100%);}
.dchead{display:grid;grid-template-columns:auto 1fr auto auto;gap:18px;align-items:center;padding:clamp(20px,2.4vw,28px) clamp(22px,2.6vw,32px);cursor:pointer;transition:all 350ms;position:relative;}
.dchead:hover{background:var(--bg2);}

.dcnum{width:48px;height:48px;border-radius:12px;background:var(--bs);border:1.5px solid var(--bl);display:flex;align-items:center;justify-content:center;font-family:var(--F);font-size:18px;font-weight:350;color:var(--blue);letter-spacing:-.02em;flex-shrink:0;transition:all 350ms;}
.dcap.op .dcnum{background:rgba(106,176,240,.18);border-color:rgba(106,176,240,.4);color:#6ab0f0;}
.dctext{min-width:0;}

.dctitle{font-family:var(--F);font-size:clamp(17px,1.7vw,22px);font-weight:400;color:var(--navy);letter-spacing:-.02em;line-height:1.25;transition:color 350ms;}

.dcarrow{width:32px;height:32px;border-radius:50%;background:var(--bg);border:1.5px solid var(--l1);display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:14px;transition:all 350ms;flex-shrink:0;}

.dcinner{padding:clamp(24px,3vw,38px) clamp(22px,2.6vw,32px);border-top:1px solid var(--l1);}

.kpcell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),#e64545);}

.bmtt{font-family:var(--F);font-size:clamp(16px,1.5vw,19px);font-weight:400;color:var(--navy);letter-spacing:-.015em;}

.gtaud{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.gtau{font-size:12px;color:var(--ink2);line-height:1.5;padding-left:14px;position:relative;}

/* === VENDOR DISPOSITION MATRIX === */
.vd2d{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:stretch;}
.vd2yaxis{display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);padding:14px 4px;}

.vd2q{padding:22px 20px;border-radius:14px;position:relative;overflow:hidden;transition:all 350ms;cursor:default;display:flex;flex-direction:column;}
.vd2q:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.06);}
.vd2q.ins{background:linear-gradient(135deg,var(--bs),rgba(26,79,150,.08));border:1.5px solid var(--blue);}

.vd2qa{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;}
.vd2q.ins .vd2qa{color:var(--blue);}
.vd2q.ret .vd2qa{color:var(--sage);}
.vd2q.reb .vd2qa{color:var(--gold);}
.vd2q.exit .vd2qa{color:var(--red);}
.vd2qt{font-family:var(--F);font-size:clamp(18px,1.9vw,24px);font-weight:350;color:var(--navy);letter-spacing:-.02em;line-height:1.2;margin-bottom:10px;}
.vd2qd{font-size:12.5px;color:var(--ink2);line-height:1.55;margin-bottom:auto;}
.vd2qe{margin-top:12px;padding-top:12px;border-top:1px dashed rgba(0,0,0,.1);font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.08em;color:var(--ink3);}
.vd2xaxis{margin-top:10px;display:flex;justify-content:space-between;padding:0 20px;font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);}
.vd2sav{margin-top:18px;background:linear-gradient(135deg,var(--navy),#1a3461);border-radius:12px;padding:20px 26px;display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center;color:#fff;position:relative;overflow:hidden;}
.vd2sav::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 90% 50%,rgba(106,176,240,.25),transparent 60%);pointer-events:none;}
.vd2sv{font-family:var(--F);font-size:clamp(32px,3.6vw,48px);font-weight:200;color:#6ab0f0;letter-spacing:-.04em;line-height:.9;position:relative;z-index:1;}
.vd2sl{position:relative;z-index:1;}
.vd2sl .l{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#6ab0f0;margin-bottom:5px;}
.vd2sl p{font-family:var(--F);font-size:13.5px;font-weight:300;line-height:1.55;color:rgba(255,255,255,.85);margin:0;}

/* === CASE STUDIES === */
.cscarousel{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.cscar{background:#fff;border:1.5px solid var(--l1);border-radius:16px;padding:24px;transition:all 350ms;position:relative;overflow:hidden;}
.cscar:hover{transform:translateY(-4px);border-color:var(--blue);box-shadow:0 18px 40px rgba(26,79,150,.1);}
.cshead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.csco{font-family:var(--F);font-size:clamp(19px,1.8vw,23px);font-weight:350;color:var(--navy);letter-spacing:-.025em;line-height:1.15;margin-bottom:5px;}
.csco em{font-style:italic;color:var(--blue);}
.cssec{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.cspill{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 11px;background:var(--bs);color:var(--blue);border-radius:100px;border:1px solid var(--bl);white-space:nowrap;flex-shrink:0;}
.csscope{font-size:12.5px;color:var(--ink2);line-height:1.6;margin-bottom:14px;padding-left:14px;border-left:2px solid var(--blue);}
.csmetrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;padding:14px 0;border-top:1px solid var(--l1);border-bottom:1px solid var(--l1);}
.csmv{font-family:var(--F);font-size:clamp(17px,1.7vw,22px);font-weight:350;color:var(--blue);letter-spacing:-.025em;line-height:1;margin-bottom:5px;}
.csml{font-family:var(--M);font-size:8px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);line-height:1.3;}
.csquote{font-family:var(--F);font-size:12.5px;font-weight:300;font-style:italic;color:var(--ink2);line-height:1.55;padding:14px 16px;background:var(--bg);border-radius:10px;position:relative;margin-bottom:10px;}
.csquote::before{content:'"';position:absolute;top:0;left:8px;font-size:30px;color:var(--blue);opacity:.4;line-height:1;font-weight:400;}
.csquote p{margin:0;padding-left:18px;}
.csref{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);}
.csref strong{color:var(--navy);font-weight:600;}

/* === MATURITY ROADMAP === */
.mrtrack{position:relative;padding:14px 0;}
.mrline{position:absolute;top:50%;left:5%;right:5%;height:2px;background:linear-gradient(90deg,var(--blue),var(--sage),var(--gold),var(--blue),var(--red));border-radius:2px;transform:translateY(-50%);z-index:0;}
.mrstops{display:grid;grid-template-columns:repeat(5,1fr);position:relative;z-index:1;gap:6px;}
.mrstop{background:#fff;border:1.5px solid var(--l1);border-radius:14px;padding:18px 16px;transition:all 350ms;cursor:default;}
.mrstop:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(0,0,0,.08);}
.mrstop:nth-child(1){border-top:4px solid var(--blue);}
.mrstop:nth-child(2){border-top:4px solid var(--sage);}
.mrstop:nth-child(3){border-top:4px solid var(--gold);}
.mrstop:nth-child(4){border-top:4px solid #c87aa0;}
.mrstop:nth-child(5){border-top:4px solid var(--red);}
.mrtime{font-family:var(--M);font-size:8.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px;}
.mrstop:nth-child(1) .mrtime{color:var(--blue);}
.mrstop:nth-child(2) .mrtime{color:var(--sage);}
.mrstop:nth-child(3) .mrtime{color:var(--gold);}
.mrstop:nth-child(4) .mrtime{color:#c87aa0;}
.mrstop:nth-child(5) .mrtime{color:var(--red);}
.mrstage{font-family:var(--F);font-size:clamp(13px,1.3vw,16px);font-weight:400;color:var(--navy);letter-spacing:-.015em;line-height:1.2;margin-bottom:8px;min-height:38px;}
.mrkpi{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.08em;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;}
.mrkpiv{font-size:11.5px;color:var(--ink2);line-height:1.5;}

/* === RACI BRIDGE === */
.bbgrid{display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:center;margin-bottom:24px;}
.bbside{background:#fff;border:1.5px solid var(--l1);border-radius:16px;padding:24px;text-align:center;position:relative;overflow:hidden;}
.bbside.cli{border-color:var(--blue);background:linear-gradient(135deg,#fff,var(--bs));}
.bbside.con{border-color:var(--red);background:linear-gradient(135deg,#fff,rgba(192,28,28,.04));}
.bbsl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;}
.bbside.cli .bbsl{color:var(--blue);}
.bbside.con .bbsl{color:var(--red);}
.bbst{font-family:var(--F);font-size:clamp(17px,1.7vw,22px);font-weight:350;color:var(--navy);letter-spacing:-.025em;margin-bottom:6px;}
.bbsv{font-family:var(--F);font-size:clamp(36px,4vw,52px);font-weight:300;color:var(--navy);letter-spacing:-.035em;line-height:1;margin:14px 0;}
.bbside.cli .bbsv{color:var(--blue);}
.bbside.con .bbsv{color:var(--red);}
.bbsd{font-size:12px;color:var(--ink3);line-height:1.5;}
.bbconn{display:flex;flex-direction:column;align-items:center;gap:6px;}
.bbarr{font-family:var(--F);font-size:32px;color:var(--ink4);}
.bbal{font-family:var(--M);font-size:8.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);writing-mode:horizontal-tb;}
.racitable{margin-top:20px;border:1px solid var(--l1);border-radius:12px;overflow:hidden;}
.racirow{display:grid;grid-template-columns:1.5fr repeat(3,1fr);font-size:12px;border-bottom:1px solid var(--l1);}
.racirow:last-child{border-bottom:none;}
.racirow.h{background:var(--navy);color:#fff;font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;}
.racirow.h>div{padding:13px 14px;}
.racirow:not(.h)>div{padding:13px 14px;border-right:1px solid var(--l1);}
.racirow:not(.h)>div:last-child{border-right:none;}
.racirow:nth-child(even):not(.h){background:var(--bg2);}
.racic{font-weight:500;color:var(--navy);}
.racicc{text-align:center;font-family:var(--M);font-size:11px;font-weight:600;letter-spacing:.06em;}
.racicc.A{color:var(--red);}
.racicc.R{color:var(--blue);}
.racicc.C{color:var(--gold);}
.racicc.I{color:var(--ink4);}
.racilegend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding:14px 16px;background:var(--bg2);border-radius:10px;font-size:11.5px;color:var(--ink2);}
.racilegend>span{display:flex;align-items:center;gap:6px;}
.racilegend>span strong{font-family:var(--M);font-size:11px;font-weight:600;letter-spacing:.05em;}

/* === GAP AGENTS === */
.gapphases{display:grid;grid-template-columns:1fr;gap:14px;}
.gapphase{background:#fff;border:1.5px solid var(--l1);border-radius:16px;overflow:hidden;}
.gapph{padding:18px 22px;background:linear-gradient(135deg,var(--navy),#1a3461);color:#fff;display:flex;justify-content:space-between;align-items:center;}
.gapphn{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;margin-bottom:4px;}
.gappht{font-family:var(--F);font-size:clamp(15px,1.5vw,19px);font-weight:400;letter-spacing:-.015em;}
.gappb{font-family:var(--F);font-size:14px;font-weight:300;color:#6ab0f0;background:rgba(106,176,240,.12);padding:6px 12px;border-radius:100px;border:1px solid rgba(106,176,240,.3);white-space:nowrap;}
.gapagents{display:grid;grid-template-columns:repeat(3,1fr);gap:0;}
.gapag{padding:18px 20px;border-right:1px solid var(--l1);transition:all 250ms;cursor:default;}
.gapag:last-child{border-right:none;}
.gapag:hover{background:var(--bs);}
.gapn{font-family:var(--F);font-size:13px;font-weight:400;color:var(--blue);letter-spacing:-.015em;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
.gapn::before{content:'⬢';color:var(--blue);font-size:14px;}
.gapd{font-size:11.5px;color:var(--ink3);line-height:1.5;}

/* === FIVE DECISIONS === */
.fdgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.fdcard{background:#fff;border:1.5px solid var(--l1);border-radius:14px;padding:20px 16px;transition:all 350ms;text-align:center;position:relative;overflow:hidden;cursor:default;}
.fdcard:hover{transform:translateY(-6px);border-color:var(--blue);box-shadow:0 18px 40px rgba(26,79,150,.08);}
.fdcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue2));}
.fdnum{font-family:var(--F);font-size:clamp(28px,3vw,40px);font-weight:200;color:var(--blue);letter-spacing:-.04em;line-height:.9;margin-bottom:8px;opacity:.6;}
.fdt{font-family:var(--F);font-size:clamp(14px,1.4vw,17px);font-weight:400;color:var(--navy);letter-spacing:-.015em;line-height:1.25;margin-bottom:8px;}
.fdt em{font-style:italic;color:var(--blue);}
.fdd{font-size:11.5px;color:var(--ink3);line-height:1.5;}

/* === DELIVERABLES MATRIX === */
.dmtable{border:1px solid var(--l1);border-radius:12px;overflow:hidden;background:#fff;}
.dmrow{display:grid;grid-template-columns:2.2fr 80px 1fr 1.3fr;font-size:12.5px;border-bottom:1px solid var(--l1);transition:background 250ms;}
.dmrow:last-child{border-bottom:none;}
.dmrow.h{background:var(--navy);color:#fff;font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;}
.dmrow.h>div{padding:13px 16px;}
.dmrow:not(.h)>div{padding:14px 16px;border-right:1px solid var(--l1);}
.dmrow:not(.h)>div:last-child{border-right:none;}
.dmrow:nth-child(even):not(.h){background:var(--bg2);}
.dmrow:not(.h):hover{background:var(--bs);}
.dmname{font-weight:500;color:var(--navy);}
.dmwk{font-family:var(--M);font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--blue);text-align:center;background:var(--bs);}
.dmrow:nth-child(even):not(.h) .dmwk{background:rgba(26,79,150,.08);}
.dmfmt{font-family:var(--M);font-size:10px;color:var(--ink3);letter-spacing:.04em;text-transform:uppercase;}
.dmlead{color:var(--ink2);}

@media(max-width:900px){
  .kpgrid,.gtgrid,.gapagents,.fdgrid{grid-template-columns:1fr;}
  .vd2grid{grid-template-columns:1fr;grid-template-rows:repeat(4,1fr);}
  .cscarousel{grid-template-columns:1fr;}
  .mrstops{grid-template-columns:1fr;}
  .bbgrid{grid-template-columns:1fr;}
  .bmtoggle{grid-template-columns:1fr;}
  .dmrow{grid-template-columns:1fr;}
  .dmrow:not(.h)>div{border-right:none;border-bottom:1px solid var(--l1);}
  .dmrow:not(.h)>div:last-child{border-bottom:none;}
  .dchead{grid-template-columns:auto 1fr auto;gap:12px;}
  .dcbadge{display:none;}
}

/* ═══ PANEL VIEW ═══ */
.pvstage{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(28px,3.5vw,42px);position:relative;overflow:hidden;}
.pvstage::before{content:'';position:absolute;top:-15%;left:-10%;width:45%;height:45%;background:radial-gradient(circle,rgba(26,79,150,.08),transparent 60%);pointer-events:none;}
.pvtabs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:28px;position:relative;z-index:1;}
.pvtab{background:#fff;border:1.5px solid var(--l1);border-radius:12px;padding:14px 8px;cursor:pointer;transition:all 280ms;position:relative;text-align:center;overflow:hidden;}
.pvtab:hover{transform:translateY(-3px);border-color:var(--bl);box-shadow:0 12px 26px rgba(26,79,150,.08);}
.pvtab.act{border-color:var(--blue);background:linear-gradient(180deg,#fff 0%,var(--bs) 100%);box-shadow:0 14px 32px rgba(26,79,150,.15);transform:translateY(-3px);}
.pvtab.act::after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:14px;height:14px;background:var(--blue);clip-path:polygon(50% 100%,0 0,100% 0);}
.pvrole{font-family:var(--F);font-size:clamp(16px,1.6vw,24px);font-weight:300;color:var(--navy);letter-spacing:-.03em;line-height:1;margin-bottom:5px;white-space:nowrap;}
.pvtab.act .pvrole{color:var(--blue);}
.pvlbl{font-family:var(--M);font-size:7.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pvtab.act .pvlbl{color:var(--blue);}

.pvbody{background:#fff;border:1.5px solid var(--l1);border-radius:18px;padding:clamp(28px,3.2vw,42px);position:relative;z-index:1;animation:pvfade 500ms cubic-bezier(.16,1,.3,1);}
@keyframes pvfade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.pvhead{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:flex-start;padding-bottom:24px;margin-bottom:24px;border-bottom:1px solid var(--l1);}
.pvmono{width:84px;height:84px;border-radius:16px;background:linear-gradient(135deg,var(--navy),#1a3461);display:flex;align-items:center;justify-content:center;font-family:var(--F);font-size:36px;font-weight:300;color:#6ab0f0;letter-spacing:-.03em;box-shadow:0 12px 32px rgba(26,79,150,.2);flex-shrink:0;}
.pvtitle{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:6px;}
.pvh{font-family:var(--F);font-size:clamp(22px,2.4vw,32px);font-weight:300;color:var(--navy);letter-spacing:-.025em;line-height:1.2;margin-bottom:8px;}
.pvh em{font-style:italic;color:var(--blue);}
.pvask{font-size:14px;color:var(--ink2);line-height:1.6;max-width:62ch;}
.pvask em{font-style:italic;color:var(--navy);font-weight:500;}

.pvgrid{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;}
.pvleft h5{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;display:flex;align-items:center;gap:9px;}
.pvleft h5::before{content:'';width:14px;height:1.5px;background:var(--blue);}
.pvkpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.pvkpi{background:var(--bg);border:1.5px solid var(--l1);border-radius:10px;padding:16px 18px;transition:all 250ms;}
.pvkpi:hover{border-color:var(--blue);transform:translateY(-2px);}
.pvkpi .kv{font-family:var(--F);font-size:clamp(22px,2.3vw,28px);font-weight:350;color:var(--navy);letter-spacing:-.025em;line-height:1;margin-bottom:6px;}
.pvkpi .kv em{font-style:normal;color:var(--ink3);font-size:.55em;font-weight:400;letter-spacing:.02em;margin-left:4px;}
.pvkpi .kl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);}
.pvconcerns{display:flex;flex-direction:column;gap:8px;}
.pvconcern{display:flex;gap:12px;padding:14px 16px;background:var(--bg);border-left:3px solid var(--blue);border-radius:0 10px 10px 0;}
.pvconcern .cnum{font-family:var(--F);font-size:18px;font-weight:350;color:var(--blue);letter-spacing:-.02em;line-height:1;flex-shrink:0;width:24px;}
.pvconcern .cbody{font-size:12.5px;color:var(--ink2);line-height:1.55;}
.pvconcern .cbody strong{font-weight:500;color:var(--navy);}

.pvright{background:linear-gradient(135deg,var(--navy),#1a3461);border-radius:14px;padding:clamp(22px,2.5vw,28px);color:#fff;position:relative;overflow:hidden;}
.pvright::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(106,176,240,.25),transparent 65%);pointer-events:none;}
.pvright h5{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;margin-bottom:14px;display:flex;align-items:center;gap:9px;position:relative;z-index:1;}
.pvright h5::before{content:'';width:14px;height:1.5px;background:#6ab0f0;}
.pvsigns{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;margin-bottom:16px;}
.pvsign{display:flex;align-items:flex-start;gap:11px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.08);}
.pvsign:last-child{border-bottom:none;padding-bottom:0;}
.pvsign .ck{width:18px;height:18px;border-radius:5px;background:rgba(106,176,240,.18);border:1px solid rgba(106,176,240,.4);display:flex;align-items:center;justify-content:center;font-size:10px;color:#6ab0f0;flex-shrink:0;margin-top:1px;}
.pvsign .sl{font-size:12.5px;color:rgba(255,255,255,.85);line-height:1.5;}
.pvsign .sl em{font-style:italic;color:#6ab0f0;}
.pvquote{padding-top:16px;border-top:1px solid rgba(255,255,255,.12);position:relative;z-index:1;}
.pvquote .qm{font-family:var(--F);font-size:36px;font-weight:200;color:#6ab0f0;letter-spacing:-.04em;line-height:.5;}
.pvquote p{font-family:var(--F);font-size:13px;font-weight:300;color:rgba(255,255,255,.85);line-height:1.55;font-style:italic;margin-top:8px;}

/* ═══ COMMERCIAL TAX RISK ═══ */
.ctrgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}
.ctrcard{background:#fff;border:1.5px solid var(--l1);border-radius:16px;padding:clamp(22px,2.6vw,30px);position:relative;overflow:hidden;transition:all 350ms;}
.ctrcard:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(0,0,0,.06);}
.ctrcard.opt{border-color:var(--blue);background:linear-gradient(135deg,#fff,var(--bs));box-shadow:0 12px 36px rgba(26,79,150,0.08), 0 0 20px rgba(106, 176, 240, 0.28);transition:all 350ms;}
.ctrcard.opt:hover{transform:translateY(-5px);box-shadow:0 20px 48px rgba(26,79,150,0.12), 0 0 28px rgba(106, 176, 240, 0.45);border-color:var(--blue);}
.ctrcard.opt::before{content:none;display:none;}
.ctrl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.ctrcard.opt .ctrl{color:var(--blue);}
.ctrh{font-family:var(--F);font-size:clamp(18px,1.9vw,24px);font-weight:350;color:var(--navy);letter-spacing:-.025em;line-height:1.25;margin-bottom:6px;}
.ctrh em{font-style:italic;color:var(--blue);}
.ctrs{font-size:12.5px;color:var(--ink3);line-height:1.55;margin-bottom:18px;}
.ctrmech{display:flex;flex-direction:column;gap:9px;margin-bottom:18px;}
.ctrm{display:flex;gap:11px;font-size:12px;color:var(--ink2);line-height:1.5;}
.ctrm .mi{width:18px;height:18px;border-radius:4px;background:var(--s1);color:var(--ink3);display:flex;align-items:center;justify-content:center;font-family:var(--M);font-size:9px;font-weight:600;flex-shrink:0;margin-top:1px;}
.ctrcard.opt .ctrm .mi{background:var(--bs);color:var(--blue);}
.ctrm strong{color:var(--navy);font-weight:500;}
.ctrtotal{padding:14px 16px;background:var(--bg);border-radius:10px;display:flex;justify-content:space-between;align-items:center;border:1px dashed var(--l1);}
.ctrcard.opt .ctrtotal{background:linear-gradient(135deg,var(--bs),rgba(26,79,150,.08));border-color:var(--blue);}
.ctrtotal .l{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.ctrtotal .v{font-family:var(--F);font-size:clamp(20px,2vw,26px);font-weight:350;color:var(--navy);letter-spacing:-.025em;}

.dbsuml{font-size:12.5px;color:var(--ink3);line-height:1.55;max-width:60ch;}
.dbsuml em{font-style:italic;color:var(--ink2);}
.dbsumv{font-family:var(--F);font-size:clamp(20px,2vw,26px);font-weight:350;letter-spacing:-.025em;}
.dbrow.them .dbsumv{color:var(--red);}
.dbrow.us .dbsumv{color:var(--blue);}

/* ═══ AI MULTIPLIER ═══ */
.amstage{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(28px,3.5vw,42px);position:relative;overflow:hidden;}
.amstage::before{content:'';position:absolute;top:-25%;left:-15%;width:50%;height:50%;background:radial-gradient(circle,rgba(106,176,240,.1),transparent 60%);pointer-events:none;}
.amstage::after{content:'';position:absolute;bottom:-25%;right:-15%;width:50%;height:50%;background:radial-gradient(circle,rgba(192,28,28,.06),transparent 60%);pointer-events:none;}
.amctrls{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;position:relative;z-index:1;}
.amctrl{background:var(--bg);border:1.5px solid var(--l1);border-radius:14px;padding:20px 22px;}
.amctrl .mmcl{margin-bottom:14px;color:var(--ink3) !important;}
.amctrl .mmsw{margin-bottom:10px;}
.amctrl .amrange{display:flex;justify-content:space-between;align-items:center;}
.amctrl .amval{font-family:var(--F);font-size:clamp(28px,3vw,40px);font-weight:300;color:var(--blue);letter-spacing:-.03em;line-height:1;}
.amctrl .ament{font-family:var(--M);font-size:9px;color:var(--ink3) !important;letter-spacing:.1em;}
.amviz{background:#fff;border:1.5px solid var(--l1);border-radius:14px;padding:clamp(20px,2.5vw,30px);position:relative;z-index:1;}
.amrow{display:grid;grid-template-columns:160px 1fr 100px;gap:18px;align-items:center;padding:14px 0;border-bottom:1px solid var(--l1);}
.amrow:last-child{border-bottom:none;}
.amrl{font-family:var(--M);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.ambar{height:24px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative;}
.ambarf{height:100%;background:var(--ink4);border-radius:6px;transition:width 800ms cubic-bezier(.16,1,.3,1);}
.amrow.ai .ambarf{background:linear-gradient(90deg,var(--blue),var(--blue2),#6ab0f0);}
.amrv{font-family:var(--F);font-size:clamp(20px,2vw,26px);font-weight:350;color:var(--navy);letter-spacing:-.025em;text-align:right;}
.amrow.ai .amrv{color:var(--blue);}
.amresult{margin-top:24px;padding:22px 26px;background:linear-gradient(135deg,var(--blue) 0%,var(--navy) 100%);border-radius:14px;display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;position:relative;overflow:hidden;}
.amresult::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 50%,rgba(106,176,240,.3),transparent 60%);pointer-events:none;}
.amrlx{font-family:var(--F);font-size:clamp(48px,6vw,80px);font-weight:200;color:#fff;letter-spacing:-.04em;line-height:.9;position:relative;z-index:1;}
.amrlx em{font-style:normal;color:#6ab0f0;font-size:.55em;font-weight:400;}
.amrmid{position:relative;z-index:1;}
.amrml{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;margin-bottom:6px;}
.amrmv{font-family:var(--F);font-size:clamp(16px,1.6vw,20px);font-weight:300;color:#fff;line-height:1.35;}
.amrmv em{font-style:italic;color:#6ab0f0;}
.amproofx{position:relative;z-index:1;background:rgba(255,255,255,.08);border:1px solid rgba(106,176,240,.3);border-radius:10px;padding:14px 18px;text-align:center;}
.amproofx .pn{font-family:var(--F);font-size:clamp(20px,2vw,26px);font-weight:350;color:#6ab0f0;letter-spacing:-.025em;line-height:1;margin-bottom:5px;}
.amproofx .pll{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);line-height:1.4;}

@media(max-width:900px){
  .mmstage{grid-template-columns:1fr;}
  .mmrows{grid-template-columns:1fr;}
  .amctrls{grid-template-columns:1fr;}
  .amrow{grid-template-columns:110px 1fr 70px;gap:10px;}
  .amresult{grid-template-columns:1fr;text-align:center;}
}

/* ═══ TOUGH QUESTIONS ═══ */
.tqgrid{display:grid;grid-template-columns:repeat(2,1fr);grid-auto-rows:1fr;gap:16px;margin-bottom:36px;perspective:1800px;}
.tqcard{background:transparent;cursor:pointer;position:relative;display:flex;flex-direction:column;}
.tqinner{position:relative;display:grid;grid-template-columns:1fr;grid-template-rows:1fr;width:100%;flex-grow:1;transition:transform 800ms cubic-bezier(.16,1,.3,1);transform-style:preserve-3d;}
.tqcard.flip .tqinner{transform:rotateY(180deg);}
.tqfront,.tqback{grid-column:1;grid-row:1;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;padding:clamp(24px,2.8vw,34px);display:flex;flex-direction:column;justify-content:space-between;gap:18px;min-height:280px;height:100%;}
.tqfront{background:var(--bg2);border:1.5px solid var(--l1);}
.tqfront:hover{border-color:var(--red);box-shadow:0 18px 50px rgba(192,28,28,.08);}
.tqback{background:linear-gradient(135deg,var(--navy) 0%,#1a3461 100%);transform:rotateY(180deg);color:#fff;border:1.5px solid var(--navy);}
.tqnum{font-family:var(--M);font-size:9.9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:18px;display:flex;align-items:center;gap:9px;}
.tqnum::before{content:'';width:14px;height:1.5px;background:var(--red);}
.tqfront h3{font-family:var(--F);font-size:clamp(19.8px,1.98vw,26.4px);font-weight:350;color:var(--navy);letter-spacing:-.02em;margin-bottom:14px;line-height:1.25;}
.tqfront h3 em{font-style:italic;color:var(--red);}
.tqobj{font-size:13.75px;color:var(--ink3);line-height:1.55;font-style:italic;border-left:2px solid var(--red);padding-left:12px;margin-top:auto;}
.tqtip{font-family:var(--M);font-size:9.35px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-top:14px;display:flex;align-items:center;gap:6px;}
.tqtip::after{content:'↻';font-size:12.1px;}
.tqback .tqnum{color:#6ab0f0;}
.tqback .tqnum::before{background:#6ab0f0;}
.tqback h4{font-family:var(--F);font-size:clamp(17.6px,1.65vw,22px);font-weight:350;color:#fff;letter-spacing:-.015em;margin-bottom:14px;line-height:1.3;}
.tqback h4 em{font-style:italic;color:#6ab0f0;}
.tqback p{font-size:14.3px;color:rgba(255,255,255,.82);line-height:1.6;margin-bottom:16px;}
.tqproof{background:rgba(255,255,255,.08);border:1px solid rgba(106,176,240,.25);border-radius:9px;padding:11px 14px;display:flex;align-items:center;gap:11px;margin-top:auto;}
.tqproof .pv{font-family:var(--F);font-size:clamp(19.8px,1.87vw,26.4px);font-weight:350;color:#6ab0f0;letter-spacing:-.02em;flex-shrink:0;}
.tqproof .pl{font-family:var(--M);font-size:9.9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);line-height:1.4;}

/* ═══ BY THE NUMBERS ═══ */
.numwall{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--navy);border-radius:22px;overflow:hidden;position:relative;}
.numwall::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(26,79,150,.4),transparent 60%),radial-gradient(circle at 70% 80%,rgba(192,28,28,.18),transparent 55%);pointer-events:none;}
.numcell{padding:clamp(32px,4vw,52px) clamp(24px,2.8vw,34px);border-right:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1;transition:background 400ms;cursor:default;}
.numcell:hover{background:rgba(255,255,255,.04);}
.numcell:nth-child(4n){border-right:none;}
.numcell:nth-last-child(-n+4){border-bottom:none;}
.numv{font-family:var(--F);font-size:clamp(36px,4.5vw,64px);font-weight:300;color:#fff;letter-spacing:-.04em;line-height:1;margin-bottom:14px;display:flex;align-items:baseline;gap:6px;}
.numv em{font-style:normal;color:#6ab0f0;font-size:.55em;font-weight:400;letter-spacing:0;}
.numv .nuc{font-family:var(--M);font-size:.35em;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.05em;margin-left:4px;}
.numl{font-family:var(--M);font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:10px;}
.nums{font-size:12px;color:rgba(255,255,255,.7);line-height:1.55;font-family:var(--B);}
.numsrc{font-family:var(--M);font-size:9px;color:rgba(106,176,240,.65);margin-top:10px;letter-spacing:.05em;}

/* ═══ US VS THEM ═══ */
.vsstage{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(28px,3.5vw,44px);}
.vstabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
.vstab{background:var(--bg);border:1.5px solid var(--l1);border-radius:12px;padding:18px 16px;cursor:pointer;transition:all 280ms;position:relative;text-align:left;}
.vstab:hover{border-color:var(--bl);transform:translateY(-3px);}
.vstab.act{border-color:var(--blue);background:var(--bs);box-shadow:0 12px 32px rgba(26,79,150,.12);}
.vstab.act.us{border-color:var(--blue);background:linear-gradient(135deg,var(--bs),rgba(26,79,150,.14));}
.vstn{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.vstab.act .vstn{color:var(--blue);}
.vstt{font-family:var(--F);font-size:clamp(15px,1.4vw,18px);font-weight:400;color:var(--navy);letter-spacing:-.015em;line-height:1.2;}
.vstab.us .vstt::after{content:' ●';color:var(--blue);font-size:10px;}
.vstable{display:grid;grid-template-columns:1.4fr repeat(2,1fr);gap:0;border:1px solid var(--l1);border-radius:14px;overflow:hidden;}
.vsrow{display:contents;}
.vshead .vsc,.vshead .vsd{background:var(--navy);color:#fff;font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:14px 18px;}
.vsc{padding:16px 18px;background:var(--bg);font-family:var(--M);font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);border-bottom:1px solid var(--l1);border-right:1px solid var(--l1);display:flex;align-items:center;}
.vsd{padding:16px 18px;background:var(--bg);font-size:13px;line-height:1.55;color:var(--ink2);border-bottom:1px solid var(--l1);border-right:1px solid var(--l1);display:flex;align-items:center;}
.vsd:last-child{border-right:none;}
.vsd.win{background:linear-gradient(135deg,var(--bs),rgba(26,79,150,.04));color:var(--navy);font-weight:500;position:relative;}
.vsd.win::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue);}
.vsd .verdict{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-top:4px;display:block;}

@media(max-width:900px){
  .tqgrid{grid-template-columns:1fr;grid-auto-rows:auto;}
  .numwall{grid-template-columns:repeat(2,1fr);}
  .numcell:nth-child(2n){border-right:none;}
  .numcell:nth-child(4n){border-right:1px solid rgba(255,255,255,.08);}
  .vstabs{grid-template-columns:1fr 1fr;}
  .vstable{grid-template-columns:1fr;}
  .vsc,.vsd{border-right:none;}
}

/* RESPONSIVE */
@media(max-width:1100px){.fgrid{grid-template-columns:1fr 1fr;}.egrid,.cstage,.tstage{grid-template-columns:1fr;}.fin{grid-template-columns:1fr 1fr;}.mpanel{grid-template-columns:1fr;}.pillars{grid-template-columns:1fr 1fr;}}
@media(max-width:900px){.shead{grid-template-columns:1fr;gap:18px;}.cmini{grid-template-columns:1fr;}.cmdiv{display:none;}.btabs{flex-direction:column;}.cviz{grid-template-columns:1fr;}.pgrid{grid-template-columns:1fr;}.wgrid{grid-template-columns:1fr 1fr;}.jdet{grid-template-columns:1fr;}.jms{grid-template-columns:1fr;}.tcmp{grid-template-columns:1fr;}.hstats{grid-template-columns:1fr 1fr;}.snav{display:none;}.hmeta{display:none;}.fin{grid-template-columns:1fr 1fr;}.calloc{grid-template-columns:1fr;}.scols{grid-template-columns:1fr;}.rscores{grid-template-columns:1fr;}.tephases{grid-template-columns:1fr;}.tedet{grid-template-columns:1fr;}.ctgrid{grid-template-columns:1fr;}.mnav{display:none;}}
@media(max-width:540px){.fgrid{grid-template-columns:1fr;}.wgrid{grid-template-columns:1fr;}.hstats{grid-template-columns:1fr 1fr;}.fin{grid-template-columns:1fr;}.pillars{grid-template-columns:1fr;}.ctgrid{grid-template-columns:1fr;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}.mtrack{animation:none;}.horb{animation:none;}}

/* ─── TRUST SECTION ─── */
.trust-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: stretch;
  margin-top: 32px;
}

@media(max-width:900px){
  .trust-cols {
    grid-template-columns: 1fr;
    gap: 24px;
  }
}

.trust-card {
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--l1);
  border-radius: 20px;
  padding: clamp(24px, 3vw, 36px);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 24px;
  box-shadow: 0 8px 32px rgba(26, 79, 150, 0.02);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  overflow: hidden;
}

.trust-card:hover {
  transform: translateY(-4px);
  border-color: var(--blue);
  box-shadow: 0 20px 48px rgba(26, 79, 150, 0.08);
  background: rgba(255, 255, 255, 0.7);
}

.trust-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--blue), var(--red));
}

.trust-quote {
  font-family: var(--F);
  font-size: clamp(18px, 1.8vw, 24px);
  font-weight: 350;
  line-height: 1.5;
  color: var(--navy);
  font-style: italic;
  position: relative;
  z-index: 2;
}

.trust-quote::before {
  content: '“';
  font-family: var(--F);
  font-size: 80px;
  position: absolute;
  top: -40px;
  left: -20px;
  color: rgba(26,79,150,0.06);
  z-index: -1;
  font-weight: 900;
}

.trust-author {
  display: flex;
  align-items: center;
  gap: 16px;
  border-top: 1px dashed var(--l1);
  padding-top: 20px;
}

.trust-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue) 0%, var(--navy) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: var(--F);
  font-weight: bold;
  font-size: 20px;
  border: 2px solid rgba(255,255,255,0.8);
  box-shadow: var(--sh2);
}

.trust-author-info h5 {
  font-family: var(--F);
  font-size: 16px;
  font-weight: 500;
  color: var(--navy);
  margin-bottom: 2px;
}

.trust-author-info p {
  font-family: var(--M);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink3);
}

.trust-pillars {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.trust-pillar-item {
  display: flex;
  gap: 16px;
  background: rgba(255, 255, 255, 0.3);
  padding: 16px 20px;
  border-radius: 12px;
  border: 1px solid var(--l1);
  transition: all 0.3s ease;
  cursor: pointer;
}

.trust-pillar-item.act {
  background: #fff;
  border-color: var(--blue);
  transform: translateX(6px);
  box-shadow: 0 4px 16px rgba(26,79,150,0.06);
}

.trust-pillar-item:hover {
  background: #fff;
  border-color: var(--blue2);
  transform: translateX(6px);
}

.trust-pillar-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bs);
  color: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
  flex-shrink: 0;
}

.trust-pillar-icon.red {
  background: var(--rs);
  color: var(--red);
}

.trust-pillar-content h4 {
  font-family: var(--F);
  font-size: 15px;
  font-weight: 500;
  color: var(--navy);
  margin-bottom: 4px;
}

.trust-pillar-content p {
  font-size: 12.5px;
  color: var(--ink2);
  line-height: 1.5;
}

/* --- Alternative Trust Presentation Component --- */
.trust-presenter-card {

  padding: clamp(32px, 5vw, 56px);

  box-shadow: var(--sh4), 0 15px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);

.presenter-glow-mesh {

.trust-presenter-card:hover {

.presenter-heading {

  font-size: clamp(22px, 2.8vw, 36px);

.presenter-heading em {

.presenter-hero-quote-container {

  padding-left: 28px;
  z-index: 2;

.presenter-hero-quote {
  font-family: var(--F);
  font-size: clamp(20px, 2.4vw, 30px);
  line-height: 1.5;
  font-weight: 300;
  font-style: italic;
  color: #ffffff;

.highlight-text-blue {

}

.highlight-text-glow {
  color: #fff;
  font-weight: 450;
  text-shadow: 0 0 15px rgba(255, 255, 255, 0.45);

.presenter-body-details {
  font-family: var(--B);
  font-size: clamp(14px, 1.2vw, 16px);
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.7);
  max-width: 82ch;
  margin-bottom: 36px;
  padding-left: 32px;

  z-index: 2;

.presenter-footer {

  align-items: center;

  border-top: 1px solid rgba(255, 255, 255, 0.08);
  padding-top: 24px;

/* Soundwave Animation */
.soundwave-container {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 38px;
  padding: 0 10px;
}

.soundwave-bar {
  width: 3px;
  background: linear-gradient(180deg, #6ab0f0, #1a4f96);
  border-radius: 3px;
  animation: pulse-wave 1.2s ease-in-out infinite alternate;
}

  0% {
    height: 8px;
    opacity: 0.3;

  100% {
    height: 32px;
    opacity: 1;
  }
}

.soundwave-bar:nth-child(2) { animation-delay: 0.4s; }
.soundwave-bar:nth-child(3) { animation-delay: 0.2s; }
.soundwave-bar:nth-child(4) { animation-delay: 0.6s; }
.soundwave-bar:nth-child(5) { animation-delay: 0.3s; }

}
@media (max-width: 600px) {
  .vcGrid {

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // disable hero stat navigation
      document.querySelectorAll(".hstat").forEach((card) => {
        card.removeAttribute("href");
        card.style.cursor = "default";

        card.addEventListener(
          "click",
          (e) => {
            e.preventDefault();
            e.stopPropagation();

            card.animate(
              [
                { transform: "scale(.98)" },
                { transform: "scale(1.02)" },
                { transform: "scale(1)" },
              ],
              {
                duration: 500,
                easing: "cubic-bezier(.16,1,.3,1)",
              },
            );

            return false;
          },
          true,
        );
      });

      // stable accordion behavior
      document.querySelectorAll(".wi-item").forEach((item) => {
        const body = item.querySelector(".wi-body");

        if (!body) return;

        body.style.maxHeight = "0px";
        body.style.overflow = "hidden";

        item.addEventListener("click", (e) => {
          if (e.target.closest("a")) return;

          const isOpen = item.classList.contains("open");

          document.querySelectorAll(".wi-item").forEach((other) => {
            if (other !== item) {
              other.classList.remove("open");

              const otherBody = other.querySelector(".wi-body");

              if (otherBody) {
                otherBody.style.maxHeight = "0px";
              }
            }
          });

          if (isOpen) {
            item.classList.remove("open");
            body.style.maxHeight = "0px";
          } else {
            item.classList.add("open");
            body.style.maxHeight = body.scrollHeight + "px";
          }
        });
      });
    });
  </script>
