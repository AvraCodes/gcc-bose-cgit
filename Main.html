<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bose GCC Proposal</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
html,body {
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
  background:#fff;
}

#root {
  width:100%;
  min-height:100vh;
}

/* ===== IMMERSIVE PATCH ===== */

.sec{
  scroll-margin-top:120px;
}

.wi-item,
.fcard,
.tephase,
.pillar,
.ccard,
.mpanel,
.jdet{
  transition:
    transform .5s cubic-bezier(.16,1,.3,1),
    box-shadow .5s cubic-bezier(.16,1,.3,1),
    border-color .4s ease;
}

.wi-item:hover,
.fcard:hover,
.tephase:hover,
.pillar:hover,
.ccard:hover,
.mpanel:hover{
  transform:translateY(-8px) scale(1.01);
  box-shadow:
    0 30px 80px rgba(0,0,0,.14),
    0 0 80px rgba(26,79,150,.10);
}

.wi-body{
  overflow:visible !important;
}

.wi-body.open{
  animation:burstReveal .7s cubic-bezier(.16,1,.3,1);
}

@keyframes burstReveal{
  from{
    opacity:0;
    transform:translateY(30px) scale(.95);
  }
  to{
    opacity:1;
    transform:none;
  }
}

.wi-body-inner{
  position:relative;
  margin-top:18px;
  border-radius:24px;
  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.9),
      rgba(246,244,240,.94)
    );
  backdrop-filter:blur(20px);
  box-shadow:
    0 20px 60px rgba(13,16,26,.08),
    0 0 100px rgba(26,79,150,.08);
  border:1px solid rgba(255,255,255,.6);
  overflow:hidden;
  padding:24px 32px !important;
}

.wi-body-inner::before{
  content:'';
  position:absolute;
  width:240px;
  height:240px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(26,79,150,.12),transparent 70%);
  top:-120px;
  right:-80px;
}

.wi-body-inner::after{
  content:'';
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(192,28,28,.08),transparent 70%);
  bottom:-100px;
  left:-80px;
}

.world-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.world-glow span{
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  opacity:.22;
  animation:floatGlow 18s ease-in-out infinite;
}

.world-glow .g1{
  width:420px;
  height:420px;
  background:#1a4f96;
  top:-120px;
  right:-80px;
}

.world-glow .g2{
  width:340px;
  height:340px;
  background:#c01c1c;
  bottom:-120px;
  left:-80px;
}

.world-glow .g3{
  width:260px;
  height:260px;
  background:#6ab0f0;
  top:40%;
  left:40%;
}

@keyframes floatGlow{
  0%,100%{
    transform:translate(0,0) scale(1);
  }
  50%{
    transform:translate(20px,-20px) scale(1.08);
  }
}

img{
  transition:transform 1.2s ease;
}

img:hover{
  transform:scale(1.04);
}

.hstat:hover .sv,
.pillar:hover .pnum,
.tephase:hover h4{
  color:#2a6fc8;
}

@media(max-width:900px){

  .wi-body-inner{
    padding:24px !important;
  }

  .hero-cols{
    grid-template-columns:1fr;
  }
  .hero-stats-col .hstats{
    grid-template-columns:repeat(2,1fr);
  }

}


/* ===== FIX WHITE TEXT ===== */

.wi-body-inner,
.wi-body-inner *{
  color:#111 !important;
}

.wi-body-inner .wi-stat{
  color:#1a4f96 !important;
}

.expand-panel.text,
.expand-panel.text *{
  color:white !important;
}

/* ===== FIX HERO 4 BLOCK NAVIGATION ===== */

.hstat{
  cursor:default !important;
}

.hstat *{
  pointer-events:none;
}

/* Disable any scroll anchor behavior */
.hstat a,
.hstat[href],
.hstat[data-target]{
  pointer-events:none !important;
}

/* ===== MAKE EVERYTHING MORE INTERACTIVE ===== */

.fcard{
  transform-style:preserve-3d;
}

.fcard:hover{
  transform:
    perspective(1400px)
    rotateX(4deg)
    rotateY(-4deg)
    translateY(-10px)
    scale(1.02);
}

.pillar{
  overflow:hidden;
}

.pillar::before{
  content:'';
  position:absolute;
  inset:-40%;
  background:
    conic-gradient(
      from 0deg,
      transparent,
      rgba(106,176,240,.18),
      transparent
    );
  animation:spinGlow 8s linear infinite;
  opacity:0;
  transition:.5s;
}

.pillar:hover::before{
  opacity:1;
}

@keyframes spinGlow{
  to{
    transform:rotate(360deg);
  }
}

.tephase:hover{
  background:
    linear-gradient(
      135deg,
      rgba(26,79,150,.08),
      rgba(255,255,255,.95)
    );
}

.mpanel{
  overflow:hidden;
}

.mpanel::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(
      circle at var(--x,50%) var(--y,50%),
      rgba(106,176,240,.14),
      transparent 35%
    );
  pointer-events:none;
  transition:.2s;
}

.wi-item{
  position:relative;
  overflow:hidden;
}

.wi-item::before{
  content:'';
  position:absolute;
  width:160px;
  height:160px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(26,79,150,.12),transparent 70%);
  top:-60px;
  right:-60px;
  opacity:0;
  transition:.4s;
}

.wi-item:hover::before{
  opacity:1;
}

.ccard:hover{
  transform:
    translateX(8px)
    scale(1.02);
}


/* ===== WHITESPACE KILLER PATCH ===== */

/* stop giant hidden containers from reserving space */
.wi-body{
  max-height:0 !important;
  overflow:hidden !important;
  padding:0 !important;
  margin:0 !important;
}

.wi-item.open .wi-body{
  max-height:240px !important;
  margin-top:10px !important;
}

/* kill giant vertical spacing */
.sec{
  padding-top:80px !important;
  padding-bottom:80px !important;
}

.hero{
  min-height:auto !important;
  padding-bottom:40px !important;
}

.mpanel,
.jdet,
.tedet{
  min-height:auto !important;
}

/* stop any accidental bottom jumps */
html,body{
  scroll-behavior:auto !important;
  overflow-anchor:none !important;
}

/* immersive open state */
.wi-item.open{
  transform:scale(1.01);
  z-index:20;
}

/* remove layout push effect */
.wi-grid{
  align-items:stretch !important;
}

/* floating reveal instead of pushing page */
.wi-body-inner{
  margin:14px 0 0 0 !important;
  position:relative !important;
  animation:floatIn .5s cubic-bezier(.16,1,.3,1);
}

@keyframes floatIn{
  from{
    opacity:0;
    transform:translateY(18px) scale(.97);
  }
  to{
    opacity:1;
    transform:none;
  }
}

/* HERO TWO-COLUMN LAYOUT */
.hero-cols{display:grid;grid-template-columns:55% 1fr;gap:clamp(40px,5vw,80px);align-items:center;margin-bottom:clamp(36px,5vw,56px);}
.hero-text{display:flex;flex-direction:column;}
.hero-text .heroh{max-width:none;}
.hero-text .hsub{margin-bottom:0;max-width:none;}
.hero-stats-col .hstats{grid-template-columns:repeat(2,1fr);margin-bottom:0;}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══ LOGO ═══════════════════════════════════════════════════════ */
const Logo = ({ size = 44 }) => (
  <img
    src="logo.png"
    style={{
      height: size,
      width: "auto",
      display: "inline-block",
      verticalAlign: "middle",
      objectFit: "contain"
    }}
    alt="Logo"
  />
);

/* ═══ RING ════════════════════════════════════════════════════════ */
const Ring = ({ score, size = 84, stroke = 7, color = "#1a4f96", animate = true }) => {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const [d, setD] = useState(0);
  useEffect(() => { if (animate) setTimeout(() => setD((score / 100) * circ), 200); else setD((score / 100) * circ); }, [score, circ, animate]);
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e8e6e1" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${d} ${circ - d}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 1.2s cubic-bezier(0.16,1,0.3,1)" }}/>
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontFamily: "var(--F)", fontSize: size * 0.28, fontWeight: 400, color, letterSpacing: "-.03em", lineHeight: 1 }}>{score}</span>
        <span style={{ fontFamily: "var(--M)", fontSize: 9, color: "#9c9590", letterSpacing: ".1em" }}>/100</span>
      </div>
    </div>
  );
};

/* ═══ CSS ═════════════════════════════════════════════════════════ */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,200..900,0..100&family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#fff;--bg2:#f6f4f0;--bg3:#eeece8;--s1:#e4e1da;--s2:#d4d0c8;
  --l1:rgba(13,16,26,.07);--l2:rgba(13,16,26,.13);--l3:rgba(13,16,26,.22);
  --ink:#0d1017;--ink2:#252219;--ink3:#6a635a;--ink4:#9c9590;
  --navy:#0d1f3c;--blue:#1a4f96;--blue2:#2a6fc8;--blue3:#6ab0f0;
  --bs:rgba(26,79,150,.08);--bl:rgba(26,79,150,.22);
  --red:#c01c1c;--red2:#e83030;--rs:rgba(192,28,28,.07);--rl:rgba(192,28,28,.22);
  --gold:#9d7c2a;--gs:rgba(157,124,42,.1);
  --sage:#2a7a3a;
  --sh1:0 1px 3px rgba(13,16,26,.05),0 1px 2px rgba(13,16,26,.03);
  --sh2:0 4px 16px rgba(13,16,26,.07),0 2px 6px rgba(13,16,26,.04);
  --sh3:0 12px 40px rgba(13,16,26,.09),0 4px 12px rgba(13,16,26,.05);
  --sh4:0 24px 64px rgba(13,16,26,.11),0 8px 20px rgba(13,16,26,.07);
  --ease:cubic-bezier(.22,.61,.36,1);
  --eout:cubic-bezier(.16,1,.3,1);
  --eb:cubic-bezier(.34,1.56,.64,1);
  --F:'Fraunces','Georgia',serif;
  --B:'Inter Tight',system-ui,sans-serif;
  --M:'JetBrains Mono','Courier New',monospace;
  --px:clamp(16px,3.5vw,72px);--mw:1480px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{}
#app{font-family:var(--B);font-size:16px;line-height:1.55;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
#app ::-webkit-scrollbar{width:4px;height:4px;}
#app ::-webkit-scrollbar-track{background:var(--bg2);}
#app ::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px;}
::selection{background:var(--blue);color:#fff;}

/* SCROLL BAR */
.spb{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--red));z-index:500;transition:width 60ms linear;box-shadow:0 0 10px rgba(26,79,150,.5);}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:400;height:68px;padding:0 var(--px);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.88);backdrop-filter:blur(20px) saturate(130%);-webkit-backdrop-filter:blur(20px) saturate(130%);border-bottom:1px solid transparent;transition:border-color 200ms,box-shadow 200ms;}
.hdr.sc{border-color:var(--l1);box-shadow:0 2px 20px rgba(13,16,26,.06);}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;}
.btext strong{display:block;font-family:var(--F);font-size:17px;font-weight:400;letter-spacing:-.01em;line-height:1.1;color:var(--navy);}
.btext em{font-style:italic;color:var(--blue);}
.btext small{display:block;font-family:var(--M);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-top:2px;}
.hmeta{display:flex;align-items:center;gap:22px;font-family:var(--M);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.sdot{display:flex;align-items:center;gap:7px;}
.sdot::before{content:'';width:6px;height:6px;background:var(--sage);border-radius:50%;animation:pdot 2.4s ease infinite;}
@keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(42,122,58,.6)}50%{box-shadow:0 0 0 5px rgba(42,122,58,0)}}
.mnav{display:flex;gap:6px;}
.mnav a{padding:7px 14px;font-family:var(--M);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);border-radius:100px;cursor:pointer;transition:all 200ms;border:1px solid transparent;}
.mnav a:hover{color:var(--blue);background:var(--bs);border-color:var(--bl);}
.mnav a.act{color:var(--blue);background:var(--bs);}

/* SIDE NAV */
.snav{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:300;display:flex;flex-direction:column;gap:4px;}
.snav a{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:5px 0;font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink4);cursor:pointer;transition:color 200ms;}
.snav a::after{content:'';width:18px;height:1.5px;background:currentColor;transition:width 200ms,background 200ms;border-radius:1px;}
.snav a:hover{color:var(--ink2);}
.snav a:hover::after{width:30px;}
.snav a.act{color:var(--blue);}
.snav a.act::after{width:42px;}
.snav a .sl{opacity:0;transition:opacity 200ms;font-size:9px;}
.snav:hover .sl{opacity:1;}

/* LAYOUT */
.wrap{max-width:var(--mw);margin:0 auto;padding:0 var(--px);position:relative;z-index:10;}
.sec{padding:clamp(64px,10vw,140px) 0;border-bottom:1px solid var(--l1);position:relative;}
.sec:last-of-type{border-bottom:none;}
.sec.alt{background:var(--bg2);}

/* SECTION HEADER */
.shead{display:grid;grid-template-columns:220px 1fr;gap:clamp(28px,5vw,80px);margin-bottom:clamp(44px,6vw,80px);align-items:end;}
.snum{font-family:var(--M);font-size:10px;font-weight:500;letter-spacing:.2em;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.snum::before{content:'';width:18px;height:1.5px;background:var(--blue);}
.skick{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);}
.sh2{font-family:var(--F);font-size:clamp(30px,4.5vw,68px);font-weight:300;line-height:.98;letter-spacing:-.035em;color:var(--navy);margin-bottom:20px;}
.sh2 em{font-style:italic;font-variation-settings:"opsz" 144,"SOFT" 100;color:var(--blue);}
.slede{font-size:clamp(13.5px,1.2vw,16.5px);color:var(--ink2);max-width:58ch;line-height:1.62;}

/* REVEAL */
.rv{opacity:0;transform:translateY(22px);transition:opacity 900ms var(--eout),transform 900ms var(--eout);}
.rv.in{opacity:1;transform:translateY(0);}
.rvs>*{opacity:0;transform:translateY(16px);transition:opacity 750ms var(--eout),transform 750ms var(--eout);}
.rvs.in>*:nth-child(1){transition-delay:0ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(2){transition-delay:65ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(3){transition-delay:130ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(4){transition-delay:195ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(5){transition-delay:260ms;opacity:1;transform:translateY(0);}
.rvs.in>*:nth-child(6){transition-delay:325ms;opacity:1;transform:translateY(0);}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;padding-top:clamp(88px,14vh,140px);padding-bottom:0;position:relative;overflow:hidden;}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(to right,rgba(13,16,26,.038) 1px,transparent 1px),linear-gradient(to bottom,rgba(13,16,26,.038) 1px,transparent 1px);background-size:clamp(36px,5vw,78px) clamp(36px,5vw,78px);pointer-events:none;}
.horb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;will-change:transform;}
.horb.a{width:640px;height:640px;top:-180px;right:-160px;background:radial-gradient(circle,rgba(26,79,150,.1),transparent 65%);animation:fo1 15s ease infinite;}
.horb.b{width:520px;height:520px;bottom:-100px;left:-120px;background:radial-gradient(circle,rgba(192,28,28,.07),transparent 65%);animation:fo2 19s ease infinite;}
.horb.c{width:380px;height:380px;top:40%;left:40%;background:radial-gradient(circle,rgba(157,124,42,.06),transparent 65%);animation:fo3 22s ease infinite;}
@keyframes fo1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,35px)}}
@keyframes fo2{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-25px)}}
@keyframes fo3{0%,100%{transform:translate(0,0)}33%{transform:translate(-20px,20px)}66%{transform:translate(20px,-15px)}}

.htag{display:flex;align-items:center;gap:11px;font-family:var(--M);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);font-weight:500;}
.htag .bar{width:26px;height:1.5px;background:linear-gradient(90deg,var(--blue),var(--red));flex-shrink:0;}

.heroh{font-family:var(--F);font-size:clamp(38px,7vw,118px);font-weight:220;font-variation-settings:"opsz" 144,"SOFT" 60;line-height:.93;letter-spacing:-.04em;color:var(--navy);max-width:17ch;margin-bottom:clamp(22px,4vw,44px);}
.heroh em{font-style:italic;font-variation-settings:"opsz" 144,"SOFT" 100;color:var(--blue);}
.rw{display:inline-block;overflow:hidden;vertical-align:top;}
.rw span{display:inline-block;transform:translateY(112%);transition:transform 950ms var(--eout);}
.hv .rw span{transform:translateY(0);}
.rw:nth-child(1) span{transition-delay:0ms}.rw:nth-child(2) span{transition-delay:65ms}.rw:nth-child(3) span{transition-delay:130ms}.rw:nth-child(4) span{transition-delay:195ms}.rw:nth-child(5) span{transition-delay:260ms}.rw:nth-child(6) span{transition-delay:325ms}

.hsub{font-size:clamp(15px,1.4vw,20px);line-height:1.55;color:var(--ink2);max-width:620px;margin-bottom:clamp(36px,5vw,56px);opacity:0;transform:translateY(14px);transition:all 900ms var(--eout) 1.1s;}
.hv .hsub{opacity:1;transform:translateY(0);}

/* HERO STATS */
.hstats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-radius:18px;overflow:hidden;border:1px solid var(--l1);box-shadow:var(--sh2);opacity:0;transform:translateY(14px);transition:all 900ms var(--eout) 1.4s;}
.hv .hstats{opacity:1;transform:translateY(0);}
.hstat{background:var(--bg);padding:24px 20px 28px;cursor:pointer;position:relative;overflow:hidden;border-right:1px solid var(--l1);transition:background 220ms;}
.hstat:last-child{border-right:none;}
.hstat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue2));transform:scaleX(0);transform-origin:left;transition:transform 380ms var(--eout);}
.hstat:hover{background:var(--bg2);}
.hstat:hover::after,.hstat.sel::after{transform:scaleX(1);}
.hstat.sel{background:var(--bs);}
.hstat .sv{font-family:var(--F);font-variation-settings:"opsz" 144,"SOFT" 50;font-size:clamp(26px,3.5vw,48px);font-weight:280;line-height:1;letter-spacing:-.04em;margin-bottom:10px;color:var(--navy);display:flex;align-items:baseline;gap:3px;}
.hstat .sv .u{font-size:.4em;color:var(--ink3);font-weight:300;}
.hstat .sv em{color:var(--blue);font-style:italic;}
.hstat .sl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);line-height:1.5;}
.harr{position:absolute;top:18px;right:18px;width:26px;height:26px;border-radius:50%;border:1px solid var(--l2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink4);transition:all 200ms;}
.hstat:hover .harr{background:var(--blue);color:#fff;border-color:var(--blue);transform:scale(1.1);}

.marq{border-top:1px solid var(--l1);background:var(--bg2);padding:10px 0;overflow:hidden;margin-top:clamp(28px,5vw,52px);}

.tephase p{font-size:13px;color:var(--ink3);line-height:1.5;}
.tedet{background:var(--bg);border:1.5px solid var(--l1);border-radius:16px;padding:clamp(24px,3vw,40px);display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,3vw,40px);min-height:260px;position:relative;overflow:hidden;transition:opacity 250ms;}
.tedet::before{content:'';position:absolute;top:0;right:0;width:220px;height:220px;background:radial-gradient(circle,var(--bs),transparent 60%);pointer-events:none;}
.tedet h3{font-family:var(--F);font-size:clamp(22px,2.2vw,30px);font-weight:300;margin-bottom:8px;letter-spacing:-.025em;color:var(--navy);}
.tedet .tmeta{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.tedet .tmeta::before{content:'';width:14px;height:1.5px;background:var(--blue);}
.tedet p{font-size:14px;color:var(--ink2);line-height:1.65;}
.telist{display:flex;flex-direction:column;gap:10px;}
.teli{display:flex;align-items:flex-start;gap:11px;font-size:13px;color:var(--ink2);line-height:1.5;}
.tec{flex-shrink:0;width:16px;height:16px;border:1.5px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--blue);background:var(--bs);margin-top:1px;}

/* JOURNEY */
.jscr{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(26px,3.5vw,42px);margin-bottom:18px;}
.jsct{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;}
.jsct h3{font-family:var(--F);font-size:clamp(17px,1.7vw,22px);font-weight:350;letter-spacing:-.02em;color:var(--navy);}
.jcnt{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--blue);background:var(--bs);padding:5px 12px;border-radius:100px;}
.jtr{position:relative;padding-bottom:40px;cursor:pointer;}
.jtrack{height:4px;background:var(--s1);border-radius:2px;position:relative;}
.jfill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--blue),var(--blue2));border-radius:2px;transition:width 480ms var(--eout);}
.jtk{position:absolute;top:50%;transform:translate(-50%,-50%);width:15px;height:15px;border-radius:50%;background:var(--bg);border:2px solid var(--s2);cursor:pointer;transition:all 220ms;z-index:2;-webkit-tap-highlight-color:transparent;}
.jtk.act{border-color:var(--blue);background:var(--blue);box-shadow:0 0 0 4px rgba(26,79,150,.15),0 0 12px var(--blue);}
.jtk:hover{border-color:var(--blue);}
.jlabs{display:flex;justify-content:space-between;position:absolute;bottom:0;left:0;right:0;}
.jlab{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);cursor:pointer;transition:color 200ms;text-align:center;flex:1;}
.jlab.act{color:var(--blue);}
.jdet{background:var(--bg);border:1.5px solid var(--l1);border-radius:16px;padding:clamp(22px,3vw,38px);display:grid;grid-template-columns:1fr 2fr;gap:clamp(22px,3vw,38px);min-height:260px;position:relative;overflow:hidden;transition:opacity 220ms;}
.jdet::before{content:'';position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle,var(--bs),transparent 60%);pointer-events:none;}
.jdl h3{font-family:var(--F);font-size:clamp(24px,2.6vw,36px);margin-bottom:8px;font-weight:300;letter-spacing:-.025em;color:var(--navy);}
.jdl .jmeta{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.jdl .jmeta::before{content:'';width:14px;height:1.5px;background:var(--blue);}
.jdl p{font-size:13.5px;color:var(--ink2);line-height:1.65;}
.jdr h4{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.jdr h4::before{content:'';width:12px;height:1.5px;background:var(--ink3);}
.jms{display:grid;grid-template-columns:1fr 1fr;gap:11px 18px;}
.jmi{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:var(--ink2);line-height:1.5;}
.jchk{flex-shrink:0;width:15px;height:15px;border:1.5px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7.5px;color:var(--blue);background:var(--bs);margin-top:1px;}
.tcmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:0;}
.tcb{background:var(--bg2);border:1.5px solid var(--l1);border-radius:12px;padding:20px 24px;}
.tcb.ours{border-color:var(--blue);background:var(--bs);}
.tclbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.tcb.ours .tclbl{color:var(--blue);}
.tcv{font-family:var(--F);font-size:clamp(20px,1.9vw,28px);margin-bottom:12px;font-weight:350;letter-spacing:-.025em;color:var(--navy);}
.tcbv{height:5px;background:var(--s1);border-radius:2px;overflow:hidden;}
.tcbf{height:100%;background:var(--s2);border-radius:2px;}
.tcb.ours .tcbf{background:linear-gradient(90deg,var(--blue),var(--blue2));}
.tcm{font-family:var(--M);font-size:9px;color:var(--ink3);margin-top:10px;letter-spacing:.05em;}

/* ENGINE */
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.gpyr{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(26px,3.5vw,40px);position:relative;overflow:hidden;}
.gpyr::before{content:'';position:absolute;top:-40%;right:-25%;width:65%;height:65%;background:radial-gradient(circle,rgba(120,150,180,.08),transparent 60%);pointer-events:none;}
.gpyr h3,.smap h3{font-family:var(--F);font-size:clamp(20px,2vw,26px);margin-bottom:6px;font-weight:350;letter-spacing:-.02em;color:var(--navy);}
.gsub{color:var(--ink3);font-size:13px;margin-bottom:26px;font-family:var(--F);font-style:italic;font-variation-settings:"opsz" 60,"SOFT" 100;}
.tier{display:grid;grid-template-columns:76px 1fr;gap:16px;padding:14px 18px;margin-bottom:10px;background:var(--bg);border:1.5px solid var(--l1);border-radius:10px;position:relative;transition:all 200ms;cursor:pointer;overflow:hidden;}
.tier::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:width 200ms;border-radius:0 1px 1px 0;}
.tier.t1::before{background:var(--blue);}
.tier.t2::before{background:var(--ink2);}
.tier.t3::before{background:var(--red);}
.tier:hover{border-color:var(--bl);transform:translateX(5px);background:var(--bs);}
.tier:hover::before{width:5px;}
.tier .tc{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;align-self:center;text-align:right;}
.tier.t1 .tc{color:var(--blue);}
.tier.t2 .tc{color:var(--ink2);}
.tier.t3 .tc{color:var(--red);}
.tier h4{font-family:var(--F);font-size:15px;margin-bottom:3px;font-weight:400;letter-spacing:-.015em;color:var(--navy);}
.tier p{font-size:12.5px;color:var(--ink2);line-height:1.45;}
.smap{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(26px,3.5vw,40px);position:relative;overflow:hidden;}
.smap::before{content:'';position:absolute;top:-25%;left:-20%;width:55%;height:55%;background:radial-gradient(circle,rgba(192,28,28,.06),transparent 60%);pointer-events:none;}
.scols{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.scol h4{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;margin-bottom:11px;padding-bottom:9px;border-bottom:1.5px solid var(--l1);display:flex;align-items:center;gap:6px;}
.scol.cl h4{color:var(--blue);border-color:var(--blue);}
.scol.us h4{color:var(--red);border-color:var(--red);}
.scol h4::before{content:'●';font-size:8px;}
.stk{padding:8px 11px;margin-bottom:5px;background:var(--bg);border:1px solid var(--l1);border-radius:6px;font-size:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 200ms;}
.stk:hover{background:var(--bs);border-color:var(--bl);transform:translateX(2px);}
.sr{font-family:var(--M);font-size:8.5px;font-weight:500;color:var(--ink3);padding:2px 5px;background:var(--bg2);border-radius:3px;}
.scol.cl .sr{color:var(--blue);}
.scol.us .sr{color:var(--red);}
.sbb{margin-top:14px;padding:12px 15px;background:linear-gradient(90deg,var(--bs),var(--rs));border:1px solid var(--l1);border-radius:9px;display:flex;align-items:center;gap:12px;}
.sbbl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);padding:3px 7px;border:1px solid var(--l2);border-radius:3px;flex-shrink:0;}
.sbbt{font-size:11.5px;color:var(--ink2);line-height:1.45;}

/* CONTROL TOWER */
.ctgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.ctq{background:var(--bg2);border:1.5px solid var(--l1);border-radius:16px;padding:24px;cursor:pointer;transition:all 250ms;position:relative;overflow:hidden;}
.ctq::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;transition:background 250ms;}
.ctq.d::before{background:var(--blue);}
.ctq.f::before{background:var(--sage);}
.ctq.p::before{background:var(--gold);}
.ctq.r::before{background:var(--red);}
.ctq:hover,.ctq.act{background:var(--bg);border-color:var(--bl);box-shadow:var(--sh2);}
.ctqh{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.ctqi{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg3);}
.ctq.d .ctqi{background:rgba(26,79,150,.1);}
.ctq.f .ctqi{background:rgba(42,122,58,.1);}
.ctq.p .ctqi{background:rgba(157,124,42,.1);}
.ctq.r .ctqi{background:rgba(192,28,28,.1);}
.ctqtitle{font-family:var(--F);font-size:clamp(17px,1.6vw,21px);font-weight:350;color:var(--navy);letter-spacing:-.015em;}
.ctqbody{font-size:13px;color:var(--ink2);line-height:1.6;}
.ctqdet{max-height:0;overflow:hidden;transition:max-height 400ms var(--eout);}
.ctq.act .ctqdet{max-height:300px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--l1);}
.ctqkpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.ctqkpi{background:var(--bg2);border-radius:8px;padding:10px 12px;}
.ctqkn{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.ctqkv{font-family:var(--F);font-size:clamp(17px,1.6vw,22px);font-weight:400;color:var(--navy);letter-spacing:-.02em;}
.ctqkv em{color:var(--blue);font-style:normal;}
.cttakeaway{background:var(--navy);border-radius:14px;padding:22px 28px;display:flex;align-items:center;gap:18px;}
.cttakeaway strong{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--blue2);flex-shrink:0;background:rgba(26,79,150,.2);padding:6px 12px;border-radius:6px;}
.cttakeaway p{color:rgba(255,255,255,.78);font-size:14.5px;font-family:var(--F);font-variation-settings:"opsz" 60,"SOFT" 80;font-weight:350;letter-spacing:-.01em;}

/* TRANSFER RADAR */
.tstage{display:grid;grid-template-columns:1.1fr 1fr;gap:clamp(26px,4.5vw,52px);align-items:start;}
.triwrap{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(28px,4vw,46px);text-align:center;}
.triwrap svg{width:100%;max-width:380px;height:auto;margin:0 auto;display:block;overflow:visible;}
.trilbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:7px;}
.trit{font-family:var(--F);font-size:clamp(20px,2vw,26px);margin-bottom:20px;font-weight:350;letter-spacing:-.02em;color:var(--navy);}
.trit em{font-style:italic;color:var(--blue);}
.rscores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px;}
.rsrow{display:grid;grid-template-columns:64px 1fr 28px;align-items:center;gap:7px;}
.rsl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);}
.rsrow input[type=range]{-webkit-appearance:none;height:3px;background:var(--s1);outline:none;border-radius:2px;cursor:pointer;}
.rsrow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--blue);border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--blue);}
.rsv{font-family:var(--M);font-size:9.5px;font-weight:500;color:var(--blue);text-align:right;}
.tpills h3{font-family:var(--F);font-size:clamp(24px,2.8vw,38px);margin-bottom:16px;font-weight:300;letter-spacing:-.025em;color:var(--navy);}
.tpills h3 em{font-style:italic;color:var(--blue);}
.tpills>p{color:var(--ink2);margin-bottom:26px;font-size:14px;line-height:1.65;max-width:52ch;}
.pil{display:grid;grid-template-columns:46px 1fr;gap:16px;padding:17px 0;border-top:1px solid var(--l1);cursor:pointer;transition:all 200ms;position:relative;}
.pil:last-child{border-bottom:1px solid var(--l1);}
.pil::after{content:'→';position:absolute;right:4px;top:50%;transform:translateY(-50%);color:var(--ink4);font-size:12px;opacity:0;transition:all 200ms;}
.pil:hover::after{opacity:1;right:0;color:var(--blue);}
.pil:hover{padding-left:6px;}
.pnum{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;color:var(--blue);}
.pil h4{font-family:var(--F);font-size:clamp(15px,1.4vw,18px);font-weight:400;margin-bottom:4px;letter-spacing:-.015em;color:var(--navy);}
.pil p{font-size:13px;color:var(--ink2);line-height:1.55;}

/* PROOF */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:56px;}
.case{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(24px,3vw,38px);cursor:pointer;transition:all 300ms;position:relative;overflow:hidden;}
.case::before{content:'';position:absolute;top:0;right:0;width:160px;height:160px;background:radial-gradient(circle,var(--bs),transparent 60%);opacity:.4;transition:opacity 300ms;}
.case:hover{border-color:var(--bl);transform:translateY(-4px);box-shadow:var(--sh3);}
.case:hover::before{opacity:1;}
.case.open{border-color:var(--blue);}
.ctag{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;display:flex;align-items:center;gap:9px;}
.ctag::before{content:'';width:14px;height:1.5px;background:var(--blue);}
.case h3{font-family:var(--F);font-size:clamp(19px,1.9vw,25px);margin-bottom:8px;font-weight:350;letter-spacing:-.025em;color:var(--navy);}
.case h3 em{font-style:italic;color:var(--ink3);}
.cmeta{font-family:var(--M);font-size:9.5px;color:var(--ink3);margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--l1);}
.cout{font-size:13.5px;color:var(--ink2);line-height:1.65;margin-bottom:20px;}
.cstat{display:flex;gap:28px;}
.csv{font-family:var(--F);font-size:clamp(22px,2.2vw,32px);color:var(--blue);display:block;line-height:1;font-weight:350;letter-spacing:-.02em;}
.csl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-top:6px;display:block;}
.cexp{max-height:0;overflow:hidden;transition:max-height 450ms var(--eout);}
.case.open .cexp{max-height:400px;margin-top:16px;padding-top:16px;border-top:1px dashed var(--l1);}
.cexplist{display:flex;flex-direction:column;gap:9px;}
.cexpit{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:var(--ink2);line-height:1.5;}
.cexpit::before{content:'→';color:var(--blue);flex-shrink:0;font-size:11px;margin-top:2px;}
.why{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(32px,4vw,52px);}
.why h3{font-family:var(--F);font-size:clamp(24px,2.8vw,38px);margin-bottom:8px;font-weight:300;letter-spacing:-.025em;color:var(--navy);}
.why h3 em{font-style:italic;color:var(--blue);}
.wsub{color:var(--ink3);margin-bottom:32px;font-family:var(--F);font-style:italic;font-variation-settings:"opsz" 60,"SOFT" 100;font-size:15px;}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.wcard{padding:18px;background:var(--bg);border:1.5px solid var(--l1);border-radius:12px;transition:all 250ms;cursor:pointer;position:relative;overflow:hidden;}
.wcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--red));transform:scaleX(0);transition:transform 350ms var(--eout);}
.wcard:hover{transform:translateY(-3px);border-color:var(--bl);box-shadow:var(--sh2);}
.wcard:hover::before{transform:scaleX(1);}
.wcard h4{font-family:var(--F);font-size:clamp(15px,1.5vw,18px);margin-bottom:8px;font-weight:400;letter-spacing:-.015em;color:var(--navy);}
.wcard p{font-size:12.5px;color:var(--ink2);line-height:1.6;}

/* CTA */
.cta{padding:clamp(60px,10vw,120px) 0;text-align:center;background:var(--navy);position:relative;overflow:hidden;}
.cta::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;height:80vw;max-width:1000px;max-height:1000px;background:radial-gradient(circle,rgba(26,79,150,.5),transparent 60%);pointer-events:none;}
.cta h2{font-family:var(--F);font-size:clamp(32px,5.5vw,80px);font-weight:220;font-variation-settings:"opsz" 144,"SOFT" 60;letter-spacing:-.04em;margin-bottom:24px;line-height:.94;color:#fff;position:relative;z-index:2;}
.cta h2 em{font-style:italic;font-variation-settings:"opsz" 144,"SOFT" 100;color:var(--blue2);}
.ctam{font-family:var(--M);font-size:10px;font-weight:500;letter-spacing:.17em;text-transform:uppercase;color:rgba(255,255,255,.45);display:flex;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap;position:relative;z-index:2;}
.ctam span{display:flex;align-items:center;gap:8px;}
.ctam span::before{content:'◆';color:var(--blue2);font-size:7px;}
.ctam span:first-child::before{display:none;}

/* FOOTER */
.foot{padding:48px var(--px) 32px;border-top:1px solid var(--l1);background:var(--bg2);}
.fin{max-width:var(--mw);margin:0 auto 36px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;}
.fbt strong{display:block;font-family:var(--F);font-size:clamp(20px,2.2vw,30px);font-weight:300;line-height:1.05;margin-bottom:12px;letter-spacing:-.025em;color:var(--navy);}
.fbt strong em{color:var(--blue);font-style:italic;}
.fsub{color:var(--ink3);font-size:13px;max-width:340px;line-height:1.6;}
.foot h5{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:13px;}
.foot ul{list-style:none;}
.foot ul li{font-size:13px;color:var(--ink2);margin-bottom:8px;line-height:1.5;}
.fbot{max-width:var(--mw);margin:0 auto;padding-top:26px;border-top:1px solid var(--l1);display:flex;justify-content:space-between;font-family:var(--M);font-size:9.5px;font-weight:500;color:var(--ink3);letter-spacing:.1em;flex-wrap:wrap;gap:12px;}

/* ═══ WALL OF IGNORANCE — punch-through risk reveal ═══ */
.wstage{background:linear-gradient(135deg,#0f1f3a 0%,var(--navy) 50%,#1a3461 100%);border-radius:22px;padding:clamp(24px,3vw,36px);position:relative;overflow:hidden;color:#fff;}
.wstage::before{content:'';position:absolute;inset:0;background:
  radial-gradient(circle at 20% 30%,rgba(106,176,240,.15),transparent 50%),
  radial-gradient(circle at 80% 70%,rgba(192,28,28,.12),transparent 45%);
  pointer-events:none;}
.wlbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;margin-bottom:8px;position:relative;z-index:1;}
.wh{font-family:var(--F);font-size:clamp(20px,2.1vw,28px);font-weight:300;color:#fff;letter-spacing:-.025em;line-height:1.2;margin-bottom:8px;position:relative;z-index:1;}
.wh em{font-style:italic;color:#6ab0f0;}
.wsub{font-size:13px;color:rgba(255,255,255,.7);line-height:1.55;max-width:62ch;margin-bottom:14px;position:relative;z-index:1;}
.wbanner{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(106,176,240,.08);border:1px solid rgba(106,176,240,.25);border-radius:10px;margin-bottom:22px;position:relative;z-index:1;flex-wrap:wrap;gap:10px;}
.wbtxt{font-family:var(--F);font-size:14px;font-weight:350;color:#fff;line-height:1.4;}
.wbtxt em{font-style:italic;color:#6ab0f0;font-weight:400;}
.wbprog{display:flex;align-items:center;gap:14px;}
.wbpv{font-family:var(--F);font-size:clamp(22px,2.2vw,28px);font-weight:300;color:#6ab0f0;letter-spacing:-.025em;line-height:1;}
.wbpv em{font-style:normal;color:rgba(255,255,255,.5);font-size:.5em;letter-spacing:.05em;margin-left:5px;}
.wbreset{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#6ab0f0;padding:8px 14px;background:rgba(106,176,240,.1);border:1px solid rgba(106,176,240,.3);border-radius:8px;cursor:pointer;transition:all 200ms;}
.wbreset:hover{background:rgba(106,176,240,.2);}

.wwall{position:relative;background:#0a1729;border-radius:14px;padding:14px;overflow:hidden;border:1px solid rgba(106,176,240,.18);}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:10px;position:relative;z-index:1;}

.wcell{position:relative;background:#fff;border-radius:12px;min-height:220px;overflow:hidden;cursor:pointer;border:1.5px solid transparent;transition:border-color 350ms;}
.wcell.h{border-color:rgba(255,82,82,.55);}
.wcell.m{border-color:rgba(255,184,77,.5);}
.wcell.l{border-color:rgba(126,217,154,.5);}

/* RISK CARD (behind the glass) */
.wcontent{position:relative;z-index:1;padding:18px;height:100%;display:flex;flex-direction:column;}
.wccat{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.wccat::before{content:'';width:12px;height:1.5px;background:currentColor;}
.wcell.h .wccat{color:var(--red);}
.wcell.m .wccat{color:var(--gold);}
.wcell.l .wccat{color:var(--sage);}
.wctitle{font-family:var(--F);font-size:13.5px;font-weight:400;color:var(--navy);letter-spacing:-.015em;line-height:1.3;margin-bottom:10px;min-height:35px;}
.wcmeta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.wcmb{padding:7px 9px;background:var(--bg);border:1px solid var(--l1);border-radius:6px;}
.wcml{font-family:var(--M);font-size:7.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px;}
.wcmv{font-family:var(--F);font-size:11px;font-weight:400;color:var(--navy);letter-spacing:-.01em;line-height:1.2;}
.wcmit{flex:1;padding:8px 10px;background:linear-gradient(135deg,var(--bs),transparent);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;font-size:10.5px;color:var(--ink2);line-height:1.45;overflow:hidden;}
.wcmit strong{display:block;font-family:var(--M);font-size:7.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:3px;}
.wcsev{position:absolute;top:14px;right:14px;font-family:var(--M);font-size:7.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:100px;}
.wcell.h .wcsev{background:rgba(192,28,28,.12);color:var(--red);}
.wcell.m .wcsev{background:rgba(184,134,11,.14);color:var(--gold);}
.wcell.l .wcsev{background:rgba(42,122,58,.12);color:var(--sage);}

/* GLASS OVERLAY */
.wglass{position:absolute;inset:0;z-index:5;cursor:pointer;
  background:
    linear-gradient(135deg,rgba(140,180,220,.85) 0%,rgba(100,140,180,.78) 50%,rgba(140,180,220,.85) 100%);
  backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
  border-radius:12px;transition:all 800ms cubic-bezier(.16,1,.3,1);overflow:hidden;}
.wglass::before{content:'';position:absolute;inset:0;background:
  repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 1px,transparent 1px,transparent 4px),
  repeating-linear-gradient(-45deg,rgba(255,255,255,.03) 0px,rgba(255,255,255,.03) 1px,transparent 1px,transparent 4px);
  pointer-events:none;}
.wglass::after{content:'';position:absolute;top:-50%;left:-30%;width:80%;height:200%;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.18) 50%,transparent 70%);transform:rotate(15deg);pointer-events:none;}

.whaze{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:18px;z-index:1;pointer-events:none;}
.whcat{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.55);filter:blur(.4px);}
.whtitle{font-family:var(--F);font-size:13.5px;font-weight:400;color:rgba(255,255,255,.4);letter-spacing:-.015em;line-height:1.3;filter:blur(1.5px);}
.whicon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-family:var(--F);font-size:22px;font-weight:300;color:rgba(255,255,255,.85);letter-spacing:-.02em;transition:all 350ms;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.whicon::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(255,255,255,.18);animation:wpulse 2.5s ease-in-out infinite;}
@keyframes wpulse{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.2);opacity:.1;}}
.wcell:hover .whicon{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5);transform:translate(-50%,-50%) scale(1.08);}
.whtag{position:absolute;bottom:18px;right:18px;font-family:var(--M);font-size:7.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:100px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.2);}

/* CRACK SVG OVERLAY (appears on click before glass disappears) */
.wcracks{position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;}
.wcell.punching .wcracks{opacity:1;animation:wcrackin 600ms cubic-bezier(.16,1,.3,1) forwards;}
@keyframes wcrackin{0%{opacity:0;transform:scale(.7);}40%{opacity:1;transform:scale(1.05);}100%{opacity:1;transform:scale(1);}}

/* PUNCH / SHATTER ANIMATION */
.wcell.punching .wglass{animation:wpunch 700ms cubic-bezier(.16,1,.3,1) forwards;}
@keyframes wpunch{
  0%{opacity:1;transform:scale(1);filter:blur(0);}
  25%{transform:scale(1.04);filter:brightness(1.4);}
  60%{opacity:.5;filter:brightness(.7) blur(1px);}
  100%{opacity:0;transform:scale(.85) rotate(-2deg);filter:blur(8px);}
}
.wcell.cleared .wglass{display:none;}
.wcell.cleared .wcracks{display:none;}
.wcell.cleared{box-shadow:0 0 0 0 currentColor;animation:wsettle 500ms cubic-bezier(.16,1,.3,1) 700ms backwards;}
.wcell.h.cleared{box-shadow:0 0 24px rgba(255,82,82,.18);}
.wcell.m.cleared{box-shadow:0 0 24px rgba(255,184,77,.16);}
.wcell.l.cleared{box-shadow:0 0 24px rgba(126,217,154,.14);}
@keyframes wsettle{0%{transform:scale(.96);}50%{transform:scale(1.02);}100%{transform:scale(1);}}

/* SHARDS (small triangles flying outward) */
.wshard{position:absolute;width:0;height:0;z-index:7;pointer-events:none;opacity:0;}
.wcell.punching .wshard{animation:wshatter 800ms cubic-bezier(.16,1,.3,1) forwards;}
@keyframes wshatter{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5) rotate(0deg);}
  20%{opacity:1;}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(1.2) rotate(var(--sr));}
}

.wstats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px;position:relative;z-index:1;}
.wst{background:rgba(255,255,255,.04);border:1px solid rgba(106,176,240,.15);border-radius:10px;padding:14px 16px;}
.wst.h{border-color:rgba(255,82,82,.35);}
.wst.m{border-color:rgba(255,184,77,.3);}
.wst.l{border-color:rgba(126,217,154,.3);}
.wstv{font-family:var(--F);font-size:clamp(22px,2.4vw,30px);font-weight:300;color:#fff;letter-spacing:-.025em;line-height:1;margin-bottom:5px;}
.wst.h .wstv{color:#ff7d7d;}
.wst.m .wstv{color:#ffc875;}
.wst.l .wstv{color:#9be8b3;}
.wstl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);}

@media(max-width:1100px){
  .wgrid{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr);}
}
@media(max-width:760px){
  .wgrid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(6,1fr);}
  .wcell{min-height:200px;}
  .wstats{grid-template-columns:repeat(2,1fr);}
  .wbanner{flex-direction:column;align-items:flex-start;}
}

/* ═══ MISSION TIMELINE — week orbit ═══ */
.mtstage{background:linear-gradient(135deg,#0f1f3a 0%,var(--navy) 100%);border-radius:22px;padding:clamp(24px,3vw,36px);position:relative;overflow:hidden;color:#fff;}
.mtstage::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(106,176,240,.16),transparent 55%);pointer-events:none;}
.mtlbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;margin-bottom:8px;position:relative;z-index:1;}
.mth{font-family:var(--F);font-size:clamp(20px,2.1vw,28px);font-weight:300;color:#fff;letter-spacing:-.025em;line-height:1.2;margin-bottom:8px;position:relative;z-index:1;}
.mth em{font-style:italic;color:#6ab0f0;}
.mtsub{font-size:13px;color:rgba(255,255,255,.7);line-height:1.55;max-width:60ch;margin-bottom:26px;position:relative;z-index:1;}

.mtruler{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:14px;position:relative;z-index:1;}
.mtweek{background:rgba(255,255,255,.04);border:1px solid rgba(106,176,240,.18);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all 300ms cubic-bezier(.16,1,.3,1);position:relative;}
.mtweek:hover{background:rgba(106,176,240,.12);border-color:rgba(106,176,240,.4);transform:translateY(-3px);}
.mtweek.act{background:linear-gradient(135deg,rgba(106,176,240,.22),rgba(106,176,240,.08));border-color:#6ab0f0;transform:translateY(-4px);box-shadow:0 14px 30px rgba(106,176,240,.18);}
.mtweek.has::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;background:#6ab0f0;border-radius:50%;box-shadow:0 0 8px #6ab0f0;}
.mtwn{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:4px;}
.mtweek.act .mtwn{color:#6ab0f0;}
.mtwv{font-family:var(--F);font-size:clamp(20px,2vw,26px);font-weight:300;color:#fff;letter-spacing:-.03em;line-height:1;}
.mtwc{font-family:var(--M);font-size:8px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-top:4px;}
.mtweek.act .mtwc{color:#6ab0f0;}

.mtboard{background:rgba(0,0,0,.18);border:1px solid rgba(106,176,240,.15);border-radius:14px;padding:clamp(20px,2.4vw,28px);position:relative;z-index:1;min-height:200px;}
.mtbhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.mtbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;}
.mtbh{font-family:var(--F);font-size:clamp(16px,1.7vw,21px);font-weight:350;color:#fff;letter-spacing:-.02em;}
.mtbh em{font-style:italic;color:#6ab0f0;}
.mtbcount{font-family:var(--F);font-size:clamp(24px,2.6vw,32px);font-weight:300;color:#6ab0f0;letter-spacing:-.03em;line-height:1;}
.mtbcount em{font-style:normal;font-size:.45em;color:rgba(255,255,255,.5);letter-spacing:.05em;margin-left:4px;}
.mtgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.mtdrop{background:rgba(255,255,255,.04);border:1px solid rgba(106,176,240,.15);border-radius:10px;padding:14px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;transition:all 280ms;}
.mtdrop:hover{background:rgba(106,176,240,.08);border-color:rgba(106,176,240,.35);transform:translateX(3px);}
.mtdpin{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#6ab0f0,#4a90d0);display:flex;align-items:center;justify-content:center;font-family:var(--F);font-size:11px;font-weight:500;color:#fff;letter-spacing:-.01em;flex-shrink:0;box-shadow:0 4px 12px rgba(106,176,240,.25);}
.mtdtxt{min-width:0;}
.mtdn{font-family:var(--F);font-size:13.5px;font-weight:400;color:#fff;letter-spacing:-.015em;line-height:1.3;margin-bottom:3px;}
.mtdm{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;color:rgba(106,176,240,.7);}
.mtdfmt{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;background:rgba(255,255,255,.06);border-radius:100px;color:rgba(255,255,255,.6);white-space:nowrap;flex-shrink:0;}
.mtemptyState{text-align:center;padding:30px 20px;color:rgba(255,255,255,.55);}
.mtemptyState .mei{font-family:var(--F);font-size:36px;font-weight:200;color:#6ab0f0;margin-bottom:8px;}
.mtemptyState .met{font-family:var(--F);font-size:14px;font-weight:350;color:rgba(255,255,255,.7);}
.mtemptyState .med{font-size:11.5px;color:rgba(255,255,255,.5);margin-top:5px;}

.mtsum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;position:relative;z-index:1;}
.mtsumc{background:rgba(255,255,255,.04);border:1px solid rgba(106,176,240,.18);border-radius:10px;padding:14px 16px;}
.mtsumv{font-family:var(--F);font-size:clamp(22px,2.4vw,30px);font-weight:300;color:#6ab0f0;letter-spacing:-.025em;line-height:1;margin-bottom:5px;}
.mtsuml{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);}

@media(max-width:900px){
  .rcboard{grid-template-columns:1fr;}
  .rcplot{height:340px;}
  .rcstats{grid-template-columns:repeat(2,1fr);}
  .mtruler{grid-template-columns:repeat(4,1fr);}
  .mtgrid{grid-template-columns:1fr;}
  .mtsum{grid-template-columns:1fr;}
}

/* ═══ DEEP DIVE CAPSULES ═══ */
.dcwrap{display:flex;flex-direction:column;gap:14px;}
.dcap{background:#fff;border:1.5px solid var(--l1);border-radius:18px;overflow:hidden;transition:all 400ms cubic-bezier(.16,1,.3,1);position:relative;}
.dcap.op{border-color:var(--blue);box-shadow:0 22px 60px rgba(26,79,150,.1);}
.dcap.op .dchead{background:linear-gradient(135deg,var(--navy) 0%,#1a3461 100%);}
.dchead{display:grid;grid-template-columns:auto 1fr auto auto;gap:18px;align-items:center;padding:clamp(20px,2.4vw,28px) clamp(22px,2.6vw,32px);cursor:pointer;transition:all 350ms;position:relative;}
.dchead:hover{background:var(--bg2);}
.dcap.op .dchead:hover{background:linear-gradient(135deg,#1a3461 0%,var(--navy) 100%);}
.dcnum{width:48px;height:48px;border-radius:12px;background:var(--bs);border:1.5px solid var(--bl);display:flex;align-items:center;justify-content:center;font-family:var(--F);font-size:18px;font-weight:350;color:var(--blue);letter-spacing:-.02em;flex-shrink:0;transition:all 350ms;}
.dcap.op .dcnum{background:rgba(106,176,240,.18);border-color:rgba(106,176,240,.4);color:#6ab0f0;}
.dctext{min-width:0;}
.dctag{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:5px;display:block;}
.dcap.op .dctag{color:#ff8888;}
.dctitle{font-family:var(--F);font-size:clamp(17px,1.7vw,22px);font-weight:400;color:var(--navy);letter-spacing:-.02em;line-height:1.25;transition:color 350ms;}
.dctitle em{font-style:italic;color:var(--blue);}
.dcap.op .dctitle{color:#fff;}
.dcap.op .dctitle em{color:#6ab0f0;}
.dcbadge{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:6px 12px;background:var(--gs);color:var(--sage);border-radius:100px;white-space:nowrap;flex-shrink:0;border:1px solid rgba(42,122,58,.2);}
.dcap.op .dcbadge{background:rgba(106,176,240,.15);color:#6ab0f0;border-color:rgba(106,176,240,.3);}
.dcarrow{width:32px;height:32px;border-radius:50%;background:var(--bg);border:1.5px solid var(--l1);display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:14px;transition:all 350ms;flex-shrink:0;}
.dcap.op .dcarrow{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff;transform:rotate(180deg);}
.dcbody{max-height:0;overflow:hidden;transition:max-height 600ms cubic-bezier(.16,1,.3,1);}
.dcap.op .dcbody{max-height:5000px;}
.dcinner{padding:clamp(24px,3vw,38px) clamp(22px,2.6vw,32px);border-top:1px solid var(--l1);}

/* === KPI PENALTY MATRIX === */
.kpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.kpcell{background:var(--bg2);border:1.5px solid var(--l1);border-radius:14px;padding:20px;transition:all 300ms;position:relative;overflow:hidden;cursor:default;}
.kpcell:hover{border-color:var(--red);transform:translateY(-4px);box-shadow:0 18px 40px rgba(192,28,28,.08);}
.kpcell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),#e64545);}
.kplbl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.kpkpi{font-family:var(--F);font-size:clamp(15px,1.5vw,19px);font-weight:400;color:var(--navy);letter-spacing:-.015em;line-height:1.3;margin-bottom:14px;}
.kpsla{padding:10px 14px;background:#fff;border-radius:8px;font-size:11.5px;color:var(--ink2);line-height:1.5;border:1px dashed var(--l1);margin-bottom:12px;}
.kpsla strong{color:var(--navy);font-weight:500;}
.kppenalty{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(135deg,rgba(192,28,28,.08),rgba(192,28,28,.02));border-left:3px solid var(--red);border-radius:0 8px 8px 0;}
.kppv{font-family:var(--F);font-size:clamp(22px,2.2vw,28px);font-weight:350;color:var(--red);letter-spacing:-.025em;line-height:1;flex-shrink:0;}
.kppl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--red);line-height:1.4;}

/* === BOT MODELS TOGGLE === */
.bmtoggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px;background:var(--bg2);border:1.5px solid var(--l1);border-radius:14px;margin-bottom:24px;}
.bmtab{padding:18px 20px;border-radius:10px;cursor:pointer;transition:all 280ms;text-align:left;background:transparent;}
.bmtab:hover{background:rgba(26,79,150,.05);}
.bmtab.act{background:#fff;box-shadow:0 8px 24px rgba(26,79,150,.12);}
.bmtn{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.bmtab.act .bmtn{color:var(--blue);}
.bmtt{font-family:var(--F);font-size:clamp(16px,1.5vw,19px);font-weight:400;color:var(--navy);letter-spacing:-.015em;}

.pvkpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.pvkpi{background:var(--bg);border:1.5px solid var(--l1);border-radius:10px;padding:16px 18px;transition:all 250ms;}
.pvkpi:hover{border-color:var(--blue);transform:translateY(-2px);}
.pvkpi .kv{font-family:var(--F);font-size:clamp(22px,2.3vw,28px);font-weight:350;color:var(--navy);letter-spacing:-.025em;line-height:1;margin-bottom:6px;}
.pvkpi .kv em{font-style:normal;color:var(--ink3);font-size:.55em;font-weight:400;letter-spacing:.02em;margin-left:4px;}
.pvkpi .kl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);}
.pvconcerns{display:flex;flex-direction:column;gap:8px;}
.pvconcern{display:flex;gap:12px;padding:14px 16px;background:var(--bg);border-left:3px solid var(--blue);border-radius:0 10px 10px 0;}
.pvconcern .cnum{font-family:var(--F);font-size:18px;font-weight:350;color:var(--blue);letter-spacing:-.02em;line-height:1;flex-shrink:0;width:24px;}
.pvconcern .cbody{font-size:12.5px;color:var(--ink2);line-height:1.55;}
.pvconcern .cbody strong{font-weight:500;color:var(--navy);}

.pvright{background:linear-gradient(135deg,var(--navy),#1a3461);border-radius:14px;padding:clamp(22px,2.5vw,28px);color:#fff;position:relative;overflow:hidden;}
.pvright::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(106,176,240,.25),transparent 65%);pointer-events:none;}
.pvright h5{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;margin-bottom:14px;display:flex;align-items:center;gap:9px;position:relative;z-index:1;}
.pvright h5::before{content:'';width:14px;height:1.5px;background:#6ab0f0;}
.pvsigns{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;margin-bottom:16px;}
.pvsign{display:flex;align-items:flex-start;gap:11px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.08);}
.pvsign:last-child{border-bottom:none;padding-bottom:0;}
.pvsign .ck{width:18px;height:18px;border-radius:5px;background:rgba(106,176,240,.18);border:1px solid rgba(106,176,240,.4);display:flex;align-items:center;justify-content:center;font-size:10px;color:#6ab0f0;flex-shrink:0;margin-top:1px;}
.pvsign .sl{font-size:12.5px;color:rgba(255,255,255,.85);line-height:1.5;}
.pvsign .sl em{font-style:italic;color:#6ab0f0;}
.pvquote{padding-top:16px;border-top:1px solid rgba(255,255,255,.12);position:relative;z-index:1;}
.pvquote .qm{font-family:var(--F);font-size:36px;font-weight:200;color:#6ab0f0;letter-spacing:-.04em;line-height:.5;}
.pvquote p{font-family:var(--F);font-size:13px;font-weight:300;color:rgba(255,255,255,.85);line-height:1.55;font-style:italic;margin-top:8px;}

/* ═══ COMMERCIAL TAX RISK ═══ */
.ctrgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}
.ctrcard{background:#fff;border:1.5px solid var(--l1);border-radius:16px;padding:clamp(22px,2.6vw,30px);position:relative;overflow:hidden;transition:all 350ms;}
.ctrcard:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(0,0,0,.06);}
.ctrcard.opt{border-color:var(--blue);background:linear-gradient(135deg,#fff,var(--bs));}
.ctrcard.opt::before{content:'★ Recommended';position:absolute;top:14px;right:14px;font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--blue);padding:5px 11px;border-radius:100px;}
.ctrl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.ctrcard.opt .ctrl{color:var(--blue);}
.ctrh{font-family:var(--F);font-size:clamp(18px,1.9vw,24px);font-weight:350;color:var(--navy);letter-spacing:-.025em;line-height:1.25;margin-bottom:6px;}
.ctrh em{font-style:italic;color:var(--blue);}
.ctrs{font-size:12.5px;color:var(--ink3);line-height:1.55;margin-bottom:18px;}
.ctrmech{display:flex;flex-direction:column;gap:9px;margin-bottom:18px;}
.ctrm{display:flex;gap:11px;font-size:12px;color:var(--ink2);line-height:1.5;}
.ctrm .mi{width:18px;height:18px;border-radius:4px;background:var(--s1);color:var(--ink3);display:flex;align-items:center;justify-content:center;font-family:var(--M);font-size:9px;font-weight:600;flex-shrink:0;margin-top:1px;}
.ctrcard.opt .ctrm .mi{background:var(--bs);color:var(--blue);}
.ctrm strong{color:var(--navy);font-weight:500;}
.ctrtotal{padding:14px 16px;background:var(--bg);border-radius:10px;display:flex;justify-content:space-between;align-items:center;border:1px dashed var(--l1);}
.ctrcard.opt .ctrtotal{background:linear-gradient(135deg,var(--bs),rgba(26,79,150,.08));border-color:var(--blue);}
.ctrtotal .l{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.ctrtotal .v{font-family:var(--F);font-size:clamp(20px,2vw,26px);font-weight:350;color:var(--navy);letter-spacing:-.025em;}
.ctrcard.opt .ctrtotal .v{color:var(--blue);}

/* TAX SAVINGS GRID */
.txgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px;}
.txcell{background:#fff;border:1.5px solid var(--l1);border-radius:14px;padding:22px 20px;position:relative;overflow:hidden;transition:all 300ms;cursor:default;}
.txcell:hover{transform:translateY(-4px);border-color:var(--blue);box-shadow:0 16px 36px rgba(26,79,150,.08);}
.txcell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue2));}
.txn{font-family:var(--F);font-size:clamp(24px,2.6vw,32px);font-weight:300;color:var(--blue);letter-spacing:-.03em;line-height:1;margin-bottom:8px;}
.txn em{font-style:normal;color:var(--ink3);font-size:.55em;font-weight:400;letter-spacing:.02em;margin-left:3px;}
.txl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);margin-bottom:8px;line-height:1.3;}
.txp{font-size:11.5px;color:var(--ink3);line-height:1.5;}
.txp strong{color:var(--ink2);font-weight:500;}

/* RISK HEATMAP */
.rhgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.rhc{background:#fff;border:1.5px solid var(--l1);border-radius:12px;padding:18px 16px;position:relative;cursor:pointer;transition:all 280ms;overflow:hidden;}
.rhc:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(0,0,0,.06);}
.rhc.h{border-left:4px solid var(--red);}
.rhc.m{border-left:4px solid var(--gold);}
.rhc.l{border-left:4px solid var(--sage);}
.rhcat{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.rht{font-family:var(--F);font-size:14px;font-weight:400;color:var(--navy);letter-spacing:-.015em;line-height:1.3;margin-bottom:12px;min-height:38px;}
.rhsev{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px dashed var(--l1);}
.rhsl{font-family:var(--M);font-size:8px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);}
.rhsv{font-family:var(--M);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:100px;}
.rhc.h .rhsv{background:rgba(192,28,28,.1);color:var(--red);}
.rhc.m .rhsv{background:rgba(184,134,11,.12);color:var(--gold);}
.rhc.l .rhsv{background:rgba(42,122,58,.1);color:var(--sage);}
.rhmit{margin-top:10px;font-size:11px;color:var(--ink3);line-height:1.5;border-top:1px solid var(--l1);padding-top:10px;}
.rhmit strong{color:var(--navy);font-weight:500;font-size:9px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px;font-family:var(--M);}

@media(max-width:900px){
  .pvtabs{grid-template-columns:repeat(3,1fr);}
  .pvgrid{grid-template-columns:1fr;}
  .pvhead{grid-template-columns:1fr;}
  .ctrgrid{grid-template-columns:1fr;}
  .txgrid{grid-template-columns:1fr 1fr;}
  .rhgrid{grid-template-columns:1fr 1fr;}
}

/* ═══ CITY BALANCER ═══ */
.cbstage{background:var(--bg2);border:1.5px solid var(--l1);border-radius:22px;padding:clamp(28px,3.5vw,44px);position:relative;overflow:hidden;}
.cbstage::before{content:'';position:absolute;top:-20%;left:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(26,79,150,.08),transparent 60%);pointer-events:none;}
.cbstage::after{content:'';position:absolute;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(192,28,28,.06),transparent 60%);pointer-events:none;}
.cbcards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px;position:relative;z-index:1;}
.cbcard{background:#fff;border:1.5px solid var(--l1);border-radius:18px;padding:clamp(22px,2.6vw,30px);position:relative;overflow:hidden;transition:all 400ms cubic-bezier(.16,1,.3,1);}
.cbcard.lead{border-color:var(--blue);box-shadow:0 18px 50px rgba(26,79,150,.12);background:linear-gradient(135deg,#fff 0%,var(--bs) 100%);}
.cbcard.lead.right{border-color:var(--red);box-shadow:0 18px 50px rgba(192,28,28,.1);background:linear-gradient(135deg,#fff 0%,rgba(192,28,28,.04) 100%);}
.cbhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.cbtag{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);}
.cbcard.lead .cbtag{color:var(--blue);}
.cbcard.lead.right .cbtag{color:var(--red);}
.cbcity{font-family:var(--F);font-size:clamp(28px,3.2vw,42px);font-weight:300;color:var(--navy);letter-spacing:-.03em;line-height:1;margin-top:4px;}
.cbsuit{font-family:var(--M);font-size:9.5px;font-weight:500;color:var(--ink3);letter-spacing:.05em;padding:6px 10px;background:var(--bg);border:1px solid var(--l1);border-radius:6px;}
.cbsuit em{font-style:normal;color:var(--blue);font-weight:600;}
.cbfte{font-family:var(--F);font-size:clamp(50px,6.5vw,84px);font-weight:200;letter-spacing:-.04em;line-height:.9;margin:18px 0 6px;color:var(--navy);transition:color 400ms;}
.cbcard.lead .cbfte{color:var(--blue);}
.cbcard.lead.right .cbfte{color:var(--red);}
.cbfl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:18px;}
.cbcost{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:16px;border-top:1px solid var(--l1);}
.cbct{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.cbcv{font-family:var(--F);font-size:clamp(18px,1.8vw,24px);font-weight:350;color:var(--navy);letter-spacing:-.025em;line-height:1;}
.cbcv em{font-style:normal;color:var(--ink3);font-size:.5em;font-weight:400;letter-spacing:.02em;margin-left:4px;}
.cbtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
.cbtagp{font-family:var(--M);font-size:8px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;background:var(--bg);border:1px solid var(--l1);border-radius:100px;color:var(--ink3);}

.cbslider{background:#fff;border:1.5px solid var(--l1);border-radius:16px;padding:24px 28px;margin-bottom:24px;position:relative;z-index:1;}
.cbslh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cbsltl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);}
.cbslreset{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);cursor:pointer;padding:5px 10px;border:1px solid var(--bl);border-radius:6px;background:var(--bs);transition:all 200ms;}
.cbslreset:hover{background:var(--blue);color:#fff;}
.cbsltrack{position:relative;height:48px;margin:8px 0 16px;}
.cbslzone{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:18%;height:12px;background:linear-gradient(90deg,rgba(26,79,150,.12),rgba(26,79,150,.22),rgba(26,79,150,.12));border-radius:6px;border:1px dashed rgba(26,79,150,.4);pointer-events:none;}
.cbslzlbl{position:absolute;top:0;left:50%;transform:translateX(-50%);font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);white-space:nowrap;}
.cbslzlbl::after{content:'↓';display:block;text-align:center;color:var(--blue);font-size:9px;margin-top:1px;}
.cbslwrap{position:absolute;top:18px;left:0;right:0;height:12px;}
.cbslbar{position:absolute;inset:0;background:linear-gradient(90deg,rgba(26,79,150,.18) 0%,var(--s1) 50%,rgba(192,28,28,.15) 100%);border-radius:6px;}
.cbslfill{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,var(--blue),var(--blue2));border-radius:6px;transition:width 200ms;}
.cbslthumb{position:absolute;top:50%;width:24px;height:24px;background:#fff;border:3px solid var(--blue);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 4px 14px rgba(26,79,150,.3),0 0 0 6px rgba(26,79,150,.1);transition:left 200ms,border-color 300ms;z-index:3;cursor:ew-resize;}
.cbslthumb.right{border-color:var(--red);box-shadow:0 4px 14px rgba(192,28,28,.3),0 0 0 6px rgba(192,28,28,.1);}
.cbsl input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:ew-resize;-webkit-appearance:none;z-index:4;}
.cbsl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;}
.cbsl input[type=range]::-moz-range-thumb{width:24px;height:24px;}
.cbslends{display:flex;justify-content:space-between;font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;}
.cbslends .l{color:var(--blue);}
.cbslends .r{color:var(--red);}
.cbslmid{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;border-top:1px dashed var(--l1);}
.cbpct{font-family:var(--F);font-size:clamp(15px,1.4vw,18px);font-weight:400;color:var(--ink2);letter-spacing:-.015em;}
.cbpct em{font-style:normal;color:var(--blue);font-weight:500;}
.cbpct em.r{color:var(--red);}

.cbsummary{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;position:relative;z-index:1;}
.cbttl{background:linear-gradient(135deg,var(--navy) 0%,#1a3461 100%);border-radius:16px;padding:clamp(22px,2.6vw,30px);color:#fff;position:relative;overflow:hidden;}
.cbttl::before{content:'';position:absolute;top:-30px;right:-30px;width:200px;height:200px;background:radial-gradient(circle,rgba(106,176,240,.3),transparent 65%);pointer-events:none;}
.cbttll{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6ab0f0;margin-bottom:8px;position:relative;z-index:1;}
.cbttlv{font-family:var(--F);font-size:clamp(36px,4.5vw,58px);font-weight:300;letter-spacing:-.04em;line-height:1;margin-bottom:10px;position:relative;z-index:1;}
.cbttlu{font-size:.4em;color:rgba(255,255,255,.5);font-weight:400;}
.cbdrow{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12);position:relative;z-index:1;}
.cbdl{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:5px;}
.cbdv{font-family:var(--F);font-size:clamp(18px,1.8vw,22px);font-weight:350;color:#fff;letter-spacing:-.02em;line-height:1;}
.cbdv.up{color:#ff7878;}
.cbdv.down{color:#7ed99a;}

.cbinsight{background:#fff;border:1.5px solid var(--l1);border-radius:16px;padding:clamp(20px,2.4vw,26px);position:relative;overflow:hidden;transition:border-color 400ms;}
.cbinsight.warn{border-color:var(--red);background:linear-gradient(135deg,#fff,rgba(192,28,28,.04));}
.cbinsight.opt{border-color:var(--blue);background:linear-gradient(135deg,#fff,var(--bs));}
.cbinsight.cau{border-color:var(--gold);background:linear-gradient(135deg,#fff,var(--gs));}
.cbil{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.cbil::before{content:'';width:14px;height:1.5px;}
.cbinsight.warn .cbil{color:var(--red);}
.cbinsight.warn .cbil::before{background:var(--red);}
.cbinsight.opt .cbil{color:var(--blue);}
.cbinsight.opt .cbil::before{background:var(--blue);}
.cbinsight.cau .cbil{color:var(--gold);}
.cbinsight.cau .cbil::before{background:var(--gold);}
.cbih{font-family:var(--F);font-size:clamp(16px,1.6vw,21px);font-weight:400;color:var(--navy);letter-spacing:-.02em;line-height:1.25;margin-bottom:10px;}
.cbih em{font-style:italic;}
.cbinsight.warn .cbih em{color:var(--red);}
.cbinsight.opt .cbih em{color:var(--blue);}
.cbinsight.cau .cbih em{color:var(--gold);}
.cbip{font-size:12.5px;color:var(--ink2);line-height:1.6;}
.cbiriskrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--l1);}
.cbirisk .l{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.cbirisk .v{font-family:var(--F);font-size:clamp(15px,1.4vw,18px);font-weight:400;color:var(--navy);letter-spacing:-.015em;line-height:1;}
.cbirisk .v.bad{color:var(--red);}
.cbirisk .v.good{color:var(--sage);}

@media(max-width:900px){
  .cbcards{grid-template-columns:1fr;}
  .cbsummary{grid-template-columns:1fr;}
}

/* ═══ MONEY MATH ═══ */
.mmstage{display:grid;grid-template-columns:1.3fr 1fr;gap:clamp(20px,2.5vw,30px);}
.mmcalc{background:linear-gradient(135deg, #0b1a30 0%, #0d1f3c 100%);border:1.5px solid rgba(255, 255, 255, 0.12);border-radius:22px;padding:clamp(26px,3.2vw,38px);position:relative;overflow:hidden;color:#fff;box-shadow: 0 12px 40px rgba(0,0,0,0.2);}
.mmcalc::before{content:'';position:absolute;top:-30%;right:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(106,176,240,.1),transparent 65%);pointer-events:none;}
.mmlbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--blue3);margin-bottom:7px;display:flex;align-items:center;gap:9px;}
.mmlbl::before{content:'';width:14px;height:1.5px;background:var(--blue3);}
.mmtitle{font-family:var(--F);font-size:clamp(22px,2.4vw,32px);font-weight:300;color:#fff;letter-spacing:-.025em;margin-bottom:6px;line-height:1.15;}
.mmtitle em{font-style:italic;color:var(--blue3);}
.mmsub{font-size:13px;color:rgba(255, 255, 255, 0.7);line-height:1.6;margin-bottom:24px;max-width:60ch;}
.mmctrl{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:18px 20px;background:rgba(255, 255, 255, 0.05);border:1.5px solid rgba(255, 255, 255, 0.1);border-radius:14px;margin-bottom:22px;color:#fff;}
.mmcl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255, 255, 255, 0.85);}
.mmsw{position:relative;height:8px;background:rgba(255, 255, 255, 0.12);border-radius:4px;overflow:visible !important;}
.mmsw .mmsfill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--blue3),var(--blue2));border-radius:4px;transition:width 200ms;overflow:visible !important;}
.mmsw .mmsfill::after{content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:#fff;border:3px solid var(--blue);border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,0.25);z-index:10;pointer-events:none;}
.mmsw .mmsfill[style*="var(--blue)"]::after{border-color:var(--blue) !important;}
.mmsw input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;-webkit-appearance:none;z-index:20;}
.mmsw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;}
.mmsw input[type=range]::-moz-range-thumb{width:14px;height:14px;}

.mmtotal .mt{font-family:var(--F);font-size:clamp(16px,1.6vw,20px);font-weight:300;color:rgba(255,255,255,.8);position:relative;z-index:1;line-height:1.3;}
.mmtotal .mv{font-family:var(--F);font-size:clamp(40px,5vw,68px);font-weight:300;color:#fff;letter-spacing:-.04em;line-height:1;position:relative;z-index:1;}
.mmtotal .mvu{font-size:.4em;color:rgba(255,255,255,.5);font-weight:400;}

.mmside{display:flex;flex-direction:column;gap:14px;}
.mmpanel{background:var(--bg2);border:1.5px solid var(--l1);border-radius:18px;padding:clamp(22px,2.5vw,28px);position:relative;overflow:hidden;}
.mmpanel.red::before{content:'';position:absolute;top:-30%;right:-20%;width:55%;height:55%;background:radial-gradient(circle,rgba(192,28,28,.08),transparent 65%);pointer-events:none;}
.mmpanel h4{font-family:var(--F);font-size:clamp(15px,1.4vw,18px);font-weight:400;color:var(--navy);letter-spacing:-.015em;margin-bottom:8px;}
.mmpanel h4 em{font-style:italic;color:var(--red);}
.mmpanel p{font-size:12.5px;color:var(--ink3);line-height:1.55;margin-bottom:14px;}
.mmbig{font-family:var(--F);font-size:clamp(28px,3vw,42px);font-weight:300;color:var(--red);letter-spacing:-.03em;line-height:1;margin-bottom:6px;}
.mmbig em{font-style:normal;color:var(--ink3);font-size:.5em;font-weight:400;letter-spacing:.02em;margin-left:6px;}

/* ═══ DOLLAR BREAKDOWN ═══ */
.dbstage{display:grid;grid-template-columns:1fr;gap:16px;}
.dbrow{background:var(--bg2);border:1.5px solid var(--l1);border-radius:18px;padding:clamp(22px,2.6vw,30px);}
.dbrow.them{border-color:rgba(192,28,28,.18);}
.dbrow.us{border-color:rgba(26,79,150,.2);background:linear-gradient(135deg,var(--bs) 0%,var(--bg2) 100%);}
.dbhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;flex-wrap:wrap;gap:14px;}
.dblbl{font-family:var(--M);font-size:9.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;}
.dbrow.them .dblbl{color:var(--red);}
.dbrow.us .dblbl{color:var(--blue);}
.dbt{font-family:var(--F);font-size:clamp(20px,2.1vw,28px);font-weight:350;color:var(--navy);letter-spacing:-.025em;line-height:1.2;}
.dbt em{font-style:italic;}
.dbrow.them .dbt em{color:var(--red);}
.dbrow.us .dbt em{color:var(--blue);}
.dbbar{position:relative;height:60px;background:var(--bg);border-radius:10px;overflow:hidden;display:flex;border:1px solid var(--l1);}
.dbseg{display:flex;flex-direction:column;justify-content:center;padding:0 14px;position:relative;transition:all 200ms;cursor:pointer;overflow:hidden;}

.dbsv{font-family:var(--F);font-size:clamp(14px,1.5vw,20px);font-weight:400;letter-spacing:-.02em;line-height:1;margin-bottom:3px;}
.dbsl{font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbsum{margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
